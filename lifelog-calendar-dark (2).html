<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, interactive-widget=resizes-content">
<title>まいにち記録</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700&family=Zen+Kurenaido&family=Inter:wght@300;400;500;600&family=Outfit:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0e1520;--bg2:#131e2e;--bg3:#182540;--bg4:#1d2c4a;
  --border:#1f3555;--border2:#284570;
  --text:#c8d8e8;--text2:#7a9ab8;--text3:#405870;
  --acc:#4ec87a;--acc2:#3aaa60;--acc-dim:#0c2218;--acc-mid:#163528;
  --sun:#c06060;--sat:#4a80c0;--today-ring:#4ec87a;
}
body{font-family:'Noto Sans JP',sans-serif;background:var(--bg);color:var(--text);font-size:14px;height:100dvh;overflow:hidden}
#app{display:flex;height:100dvh;overflow:hidden}

/* ── SIDEBAR ── */
#sidebar{width:200px;min-width:200px;background:var(--bg2);border-right:1px solid var(--border);display:flex;flex-direction:column;padding:0;transition:transform .25s ease,width .25s ease;overflow:hidden;flex-shrink:0;position:relative;z-index:60}
#sidebar.collapsed{width:44px;min-width:44px}
#sidebar.collapsed .nav-label,#sidebar.collapsed .nav-section,#sidebar.collapsed .cdot-wrap{display:none}
#sidebar.collapsed .nav-item{justify-content:center;padding:8px 0;margin:1px 4px}
#sidebar.collapsed #sb-title{display:none}
/* overlay */
#sb-overlay{display:none;position:fixed;inset:0;z-index:55;background:transparent;-webkit-tap-highlight-color:transparent}
#sb-overlay.visible{display:block}
.nav-label{white-space:nowrap}
.cdot-wrap{display:flex;align-items:center;gap:9px}
#sb-top{height:45px;display:flex;align-items:center;gap:8px;padding:0 10px;border-bottom:1px solid var(--border);margin-bottom:8px;flex-shrink:0}
#sb-title{font-family:'Zen Kurenaido',sans-serif;font-size:14px;color:var(--acc);white-space:nowrap;opacity:.85;letter-spacing:.5px}
#sb-toggle{background:none;border:none;cursor:pointer;color:var(--text2);padding:5px 6px;border-radius:5px;display:flex;flex-direction:column;gap:4px;flex-shrink:0;transition:color .15s}
#sb-toggle:hover{color:var(--acc)}
#sb-toggle span{display:block;width:16px;height:2px;background:currentColor;border-radius:1px}
.nav-item{display:flex;align-items:center;gap:9px;padding:7px 12px;cursor:pointer;border-radius:5px;margin:1px 6px;font-size:12px;color:var(--text2);transition:all .15s;user-select:none}
.nav-item:hover{background:var(--bg3);color:var(--text)}
.nav-item.active{background:var(--acc-mid);color:var(--acc)}
.nav-item svg{width:14px;height:14px;flex-shrink:0;stroke:currentColor;fill:none;stroke-width:2}
.nav-section{font-size:9px;color:var(--text3);letter-spacing:2px;text-transform:uppercase;padding:10px 14px 4px;margin-top:4px}
.cdot{width:7px;height:7px;border-radius:50%;flex-shrink:0}

/* ── MAIN ── */
#main{flex:1;overflow:hidden;display:flex;flex-direction:column;min-width:0}
.topbar{padding:9px 16px;background:var(--bg2);border-bottom:1px solid var(--border);display:flex;align-items:center;gap:10px;flex-shrink:0}
.topbar h2{font-size:13px;font-weight:500;flex:1;color:var(--text)}
.btn{padding:4px 11px;border-radius:5px;border:1px solid var(--border2);background:transparent;color:var(--text2);font-size:12px;cursor:pointer;font-family:inherit;transition:all .15s;user-select:none}
.btn:hover{border-color:var(--acc);color:var(--acc)}
.btn.primary{background:var(--acc);border-color:var(--acc);color:#fff0e8;font-weight:700}
.btn.primary:hover{background:var(--acc2)}
.btn.atgl{background:var(--acc-mid);border-color:var(--acc);color:var(--acc)}
input,textarea,select{font-family:inherit;font-size:12px;border:1px solid var(--border2);border-radius:5px;padding:6px 9px;background:var(--bg3);color:var(--text);outline:none;width:100%}
input:focus,textarea:focus,select:focus{border-color:var(--acc)}
select option{background:var(--bg3);color:var(--text)}
textarea{resize:vertical;min-height:70px}
.flabel{font-size:10px;color:var(--text3);margin-bottom:3px;font-weight:500;letter-spacing:.3px;display:block}
.frow{margin-bottom:9px}
.numrow{display:flex;gap:7px}
.empty{text-align:center;padding:20px 12px;color:var(--text3);font-size:12px;line-height:1.8}

/* ── CAL HEADER ── */
#cal-header{height:45px;padding:0 14px;background:var(--bg2);border-bottom:1px solid var(--border);display:flex;align-items:center;gap:8px;flex-shrink:0}
#cal-year-month{font-size:15px;font-weight:700;color:var(--text);letter-spacing:1px;flex:1}

/* ── TOPBAR — same height as sb-top ── */
.topbar{height:45px;padding:0 16px;background:var(--bg2);border-bottom:1px solid var(--border);display:flex;align-items:center;gap:10px;flex-shrink:0}
.topbar h2{font-size:13px;font-weight:500;flex:1;color:var(--text)}
.view-pill{display:flex;background:var(--bg3);border-radius:20px;padding:2px;gap:2px;border:1px solid var(--border)}
.view-pill button{border:none;background:transparent;color:var(--text3);font-size:11px;padding:3px 10px;border-radius:16px;cursor:pointer;font-family:inherit;transition:all .2s;white-space:nowrap}
.view-pill button.on{background:var(--acc-mid);color:var(--acc);font-weight:700}

/* ── CALENDAR SCROLL ── */
#cal-scroll{flex:1;overflow-y:auto;scrollbar-width:thin;scrollbar-color:var(--border) transparent}
#cal-scroll::-webkit-scrollbar{width:3px}
#cal-scroll::-webkit-scrollbar-thumb{background:var(--border2);border-radius:2px}
.cal-grid-single{display:grid;grid-template-columns:repeat(7,1fr);gap:1px;padding:0 4px}
.cal-day{height:90px;min-height:90px;max-height:90px;border-radius:3px;padding:5px 5px 4px;cursor:pointer;transition:background .1s;border:1px solid transparent;display:flex;flex-direction:column;overflow:hidden}
.cal-day:hover{background:var(--bg4)}
.cal-day.today{border-color:var(--today-ring)!important;background:var(--acc-dim)!important}
.cal-day.dim-month{opacity:.32}
.day-num{font-size:11px;font-weight:500;line-height:1;color:var(--text2);margin-bottom:3px;flex-shrink:0}
.cal-day.sun .day-num{color:var(--sun)}
.cal-day.sat .day-num{color:var(--sat)}
.dot-row{display:flex;flex-wrap:wrap;gap:2px;margin-bottom:2px;flex-shrink:0}
.dot{width:4px;height:4px;border-radius:50%;flex-shrink:0}
.cal-day.hol .day-num{color:var(--sun)}
/* ── WEEK VIEW (Google Calendar style) ── */
/* ═══════════════════════════════════════════
   WEEK VIEW — Linear / Notion Calendar style
   「線で区切るUI」ではなく「空間で区切るUI」
═══════════════════════════════════════════ */
#week-view{
  background:linear-gradient(180deg,#0e1520 0%,#0d0b0b 100%);
  display:flex;flex-direction:column;overflow:hidden;
}
.wk-outer{flex:1;overflow:hidden;display:flex;flex-direction:column}
.wk-scroll{
  flex:1;overflow-y:auto;overflow-x:hidden;
  scrollbar-width:thin;scrollbar-color:rgba(255,255,255,.04) transparent;
}
.wk-scroll::-webkit-scrollbar{width:3px}
.wk-scroll::-webkit-scrollbar-thumb{background:rgba(255,255,255,.06);border-radius:2px}

/* ── HEADER ── */
.wk-head-col{
  text-align:center;padding:10px 4px 8px;cursor:pointer;
  transition:background .15s;border-radius:8px 8px 0 0;
  position:relative;
}
.wk-head-col:hover{background:rgba(255,255,255,.03)}
.wk-head-col .wk-dow{
  font-size:10px;font-weight:600;color:rgba(180,130,100,.6);
  letter-spacing:1.2px;text-transform:uppercase;margin-bottom:5px;
}
.wk-head-col .wk-num{
  font-size:20px;font-weight:300;font-family:'Outfit',sans-serif;
  color:rgba(220,180,140,.8);line-height:1;
  width:34px;height:34px;display:inline-flex;
  align-items:center;justify-content:center;
  border-radius:50%;transition:all .2s;
}
/* today header */
.wk-head-col.wk-today .wk-dow{color:rgba(212,160,48,.95);letter-spacing:1.2px}
.wk-head-col.wk-today .wk-num{
  background:rgba(212,160,48,.18);color:#6edea0;font-weight:500;
  box-shadow:0 0 0 1px rgba(212,160,48,.4),0 0 20px rgba(212,160,48,.18);
}
/* sun / sat */
.wk-head-col.wk-sun .wk-dow{color:rgba(210,110,110,.75)}
.wk-head-col.wk-sun .wk-num{color:rgba(210,110,110,.8)}
.wk-head-col.wk-sat .wk-dow{color:rgba(90,150,220,.75)}
.wk-head-col.wk-sat .wk-num{color:rgba(90,150,220,.8)}

/* ── GUTTER (time labels panel) ── */
.wk-gutter-cell{
  background:rgba(14,8,8,.7);
  border-right:1px solid rgba(200,80,80,.05);
  position:relative;box-sizing:border-box;
}
.wk-gutter-cell .wk-tlbl{
  position:absolute;top:-8px;right:10px;
  font-size:11px;font-family:'Inter',sans-serif;
  color:rgba(180,140,100,.7);letter-spacing:-.2px;
  font-weight:400;
}

/* fade-in on load to hide initial scroll jump */
#week-view.wk-ready{animation:wkFadeIn .18s ease forwards}
@keyframes wkFadeIn{from{opacity:0}to{opacity:1}}

/* ── DAY COLUMNS ── */
/* base: no border, just space */
.wk-day-cell{
  box-sizing:border-box;position:relative;
  border-bottom:none; /* no horizontal lines by default */
}
/* hourly line — subtle, only on :00 rows */
.wk-day-cell.wk-hour-boundary{
  border-top:1px solid rgba(200,80,80,.06);
}
/* half-hour — barely visible */
.wk-day-cell.wk-half-boundary{
  border-top:1px dashed rgba(255,255,255,.02);
}
/* today column glow */
.wk-day-cell.wk-today-col{
  background:linear-gradient(180deg,
    rgba(212,160,48,.025) 0%,
    rgba(212,160,48,.018) 50%,
    rgba(212,160,48,.025) 100%);
}
/* column separators — almost invisible */
.wk-day-cell.wk-col-start{
  border-left:1px solid rgba(255,255,255,.03);
}

/* day column background tints (subtle warmth variation) */
.wk-day-cell.wk-col-0{background-color:rgba(180,100,100,.012)} /* sun */
.wk-day-cell.wk-col-6{background-color:rgba(74,128,192,.012)}  /* sat */
/* today overrides */
.wk-day-cell.wk-today-col.wk-col-0,
.wk-day-cell.wk-today-col.wk-col-6{
  background:linear-gradient(180deg,rgba(212,160,48,.025) 0%,rgba(212,160,48,.018) 100%);
}

/* ── TODAY COLUMN TOP INDICATOR ── */
.wk-today-top-bar{
  position:absolute;top:0;left:0;right:0;height:2px;
  background:linear-gradient(90deg,transparent,rgba(212,160,48,.5),transparent);
  pointer-events:none;z-index:2;
}

/* ── ALL-DAY STRIP ── */
.wk-allday-gutter{
  background:rgba(14,8,8,.7);
  border-right:1px solid rgba(200,80,80,.05);
  border-bottom:1px solid rgba(255,255,255,.05);
  font-size:9px;color:rgba(100,130,160,.4);
  text-align:right;padding:4px 8px 4px 0;
}
.wk-allday-col{
  border-bottom:1px solid rgba(255,255,255,.05);
  padding:3px 4px;
}
.wk-allday-ev{
  font-size:10px;border-radius:4px;padding:2px 7px;
  margin-bottom:2px;color:#fff;font-weight:500;
  cursor:pointer;overflow:hidden;white-space:nowrap;text-overflow:ellipsis;
  background:rgba(60,100,160,.6);
  backdrop-filter:blur(4px);
}

/* ── EVENT BLOCKS ── */
.wk-ev{
  position:absolute;border-radius:6px;
  padding:4px 7px;font-size:10px;font-weight:500;
  color:rgba(255,255,255,.95);overflow:hidden;cursor:pointer;
  backdrop-filter:blur(8px);
  box-shadow:0 2px 12px rgba(0,0,0,.3),inset 0 1px 0 rgba(255,255,255,.1);
  transition:filter .15s,transform .1s;border:none;
}
.wk-ev:hover{filter:brightness(1.12);transform:translateY(-1px)}
.wk-ev .wk-ev-title{font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;font-size:10px}
.wk-ev .wk-ev-time{font-size:9px;opacity:.7;margin-top:1px;white-space:nowrap}

/* ── NOW LINE ── */
.wk-now-dot{
  width:7px;height:7px;border-radius:50%;
  background:#4ec87a;
  position:absolute;left:-3.5px;top:-3px;
  box-shadow:0 0 8px rgba(212,160,48,.8);
}
.wk-now-line-el{
  height:1px;
  background:linear-gradient(90deg,rgba(212,160,48,.9) 0%,rgba(212,160,48,.3) 100%);
  position:absolute;left:0;right:0;top:0;
}

/* ── MOOD/COND CHART ── */
.mood-chart-wrap{background:var(--bg2);border-radius:7px;border:1px solid var(--border);padding:13px;margin-bottom:12px}
.mood-line{display:flex;align-items:flex-end;gap:3px;height:60px;margin-top:8px}
.mood-bar-wrap{flex:1;display:flex;flex-direction:column;align-items:center;gap:2px}
.mood-dot{width:8px;height:8px;border-radius:50%}
.mood-date{font-size:7px;color:var(--text3)}

/* ── WORD CLOUD ── */
.wcloud{display:flex;flex-wrap:wrap;gap:6px;padding:8px 0;align-items:center;line-height:1.6}
.wc-tag{border-radius:12px;padding:3px 10px;cursor:default;opacity:.85}

/* ── SUMMARY ── */
.sum-section{background:var(--bg2);border-radius:7px;border:1px solid var(--border);padding:13px;margin-bottom:12px}
.sum-section-title{font-size:12px;font-weight:700;color:var(--text);margin-bottom:8px}
.hol-name{font-size:7px;color:var(--sun);margin-left:3px;opacity:.8;white-space:nowrap;overflow:hidden;max-width:calc(100% - 18px);display:inline-block;vertical-align:middle;text-overflow:ellipsis}
.cell-divider{height:1px;background:var(--border);margin:2px 0;opacity:.4;flex-shrink:0}
.cell-bottom{flex:1;overflow:hidden}
.epreview{font-size:9px;color:var(--text3);line-height:1.45;overflow:hidden;white-space:nowrap;text-overflow:ellipsis;display:block;max-width:100%}
.tpreview{font-size:9px;line-height:1.45;overflow:hidden;white-space:nowrap;text-overflow:ellipsis;display:block;max-width:100%}
.evpreview{font-size:9px;color:#6090cc;line-height:1.45;overflow:hidden;white-space:nowrap;text-overflow:ellipsis;display:block;max-width:100%}
/* cell content wrapper — hard clip at available height */
.cell-lines{overflow:hidden;flex:1;display:flex;flex-direction:column;min-height:0}

/* ── PANEL ── */
#panel{width:360px;min-width:360px;background:var(--bg2);border-left:1px solid var(--border);display:flex;flex-direction:column;transform:translateX(100%);transition:transform .2s;position:fixed;right:0;top:0;bottom:0;z-index:100}
#panel.open{transform:translateX(0)}
#ph{padding:11px 14px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:8px;flex-shrink:0}
#ph h3{font-size:13px;font-weight:500;flex:1;color:var(--text)}
#pcls{background:none;border:none;cursor:pointer;color:var(--text3);font-size:18px;line-height:1;font-family:inherit}
#pcls:hover{color:var(--text)}
#panel-tabs{display:flex;gap:4px;padding:8px 12px;border-bottom:1px solid var(--border);flex-shrink:0}
#panel-tabs button{flex:1;padding:5px;border-radius:5px;border:1px solid var(--border2);background:transparent;color:var(--text3);font-size:11px;cursor:pointer;font-family:inherit;transition:all .15s}
#panel-tabs button.active{background:var(--acc-mid);border-color:var(--acc);color:var(--acc);font-weight:700}
#panel-scroll{flex:1;overflow-y:auto;display:flex;flex-direction:column;scrollbar-width:thin;scrollbar-color:var(--border) transparent}
#pbody{padding:12px 12px 0}
#rform{padding:11px 14px 20px;border-top:1px solid var(--border);margin-top:8px}
.stitle{font-size:10px;font-weight:700;color:var(--text3);letter-spacing:1px;text-transform:uppercase;margin:10px 0 6px;display:flex;align-items:center;justify-content:space-between}

/* Panel todo items (no border between) */
.todo-item{display:flex;align-items:center;gap:7px;padding:5px 0}
.tcheck{width:14px;height:14px;border-radius:3px;border:1.5px solid var(--border2);cursor:pointer;flex-shrink:0;display:flex;align-items:center;justify-content:center;transition:all .15s}
.tcheck.done{background:var(--acc);border-color:var(--acc)}
.tcheck.done::after{content:'✓';color:#060e09;font-size:9px;font-weight:700}
/* priority colors */
.tcheck.pri-now{border-color:#c06060;background:#200a0a}
.tcheck.pri-later{border-color:#c89840;background:#1a1004}
.tcheck.pri-someday{border-color:#4a80c0;background:#0c1828}
.ttext{flex:1;font-size:12px;line-height:1.4;min-width:0}
.ttext.pri-now{color:#d87070}
.ttext.pri-later{color:#c8a860}
.ttext.pri-someday{color:#8aabcc}
.ttext.done{text-decoration:line-through;color:var(--text3)!important}
.ttmeta{font-size:10px;color:var(--text3);margin-top:1px}
.tdel{cursor:pointer;color:var(--text3);font-size:11px;padding:2px 3px;flex-shrink:0}
.tdel:hover{color:var(--sun)}
.add-todo-row{display:flex;gap:6px;margin-top:6px}
.add-todo-row input{flex:1}

/* Entry cards */
.ecard{background:var(--bg3);border-radius:6px;padding:10px;margin-bottom:7px;border-left:2px solid #333}
.ecard .clabel{font-size:9px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;margin-bottom:3px}
.ecard .etext{font-size:12px;color:var(--text);line-height:1.6}
.ecard .emeta{font-size:10px;color:var(--text3);margin-top:5px;display:flex;justify-content:space-between;align-items:center;gap:6px}
.ecard .eactions{display:flex;gap:5px}
.eact{cursor:pointer;color:var(--text3);font-size:10px;padding:1px 5px;border-radius:3px;border:1px solid var(--border);background:transparent;font-family:inherit;transition:all .15s}
.eact:hover{color:var(--acc);border-color:var(--acc)}
.eact.del:hover{color:var(--sun);border-color:var(--sun)}
.edit-form{margin-top:8px;padding-top:8px;border-top:1px solid var(--border)}
.edit-form textarea{width:100%;margin-bottom:6px}
.edit-form .erow{display:flex;gap:6px;margin-bottom:6px}
.edit-form .erow input,.edit-form .erow select{flex:1}
.edit-form .ebtns{display:flex;gap:6px}

/* Event card */
.evcard{background:var(--bg3);border-radius:6px;padding:10px;margin-bottom:7px;border-left:2px solid #4a80c0}
.evcard .evtime{font-size:10px;color:#4a80c0;margin-bottom:3px;font-weight:500}
.evcard .evtitle{font-size:12px;color:var(--text);font-weight:500;line-height:1.4}
.evcard .evnote{font-size:11px;color:var(--text3);margin-top:3px;line-height:1.4}
.evcard .evactions{display:flex;gap:5px;margin-top:6px;justify-content:flex-end}

/* Badge */
.badge{font-size:9px;padding:2px 7px;border-radius:10px;font-weight:700;letter-spacing:.5px}
.b-study{background:#0c2040;color:#5090c8}
.b-diary{background:#1e1a06;color:#d4a843}
.b-finance{background:#1a1004;color:#c89840}
.b-exercise{background:#1e0818;color:#c058a0}
.b-game{background:#1a1040;color:#a080e8}
.b-book{background:#001a1a;color:#30c0c0}
.cat-game{border-left-color:#8060c8!important}
.cat-book{border-left-color:#20a0a0!important}
.dot-game{background:#8060c8}
.dot-book{background:#20a0a0}
.cat-diary{border-left-color:#4ec87a!important}
.cat-finance{border-left-color:#c89840!important}
.cat-exercise{border-left-color:#c058a0!important}
.cat-other{border-left-color:#506070!important}
.dot-study{background:#4070b0}
.dot-diary{background:#4ec87a}
.dot-finance{background:#c89840}
.dot-exercise{background:#c058a0}
.dot-other{background:#506070}
.dot-event{background:#4a80c0}

/* Finance */
.fin-card{background:var(--bg3);border-radius:6px;padding:10px;margin-bottom:7px;border-left:2px solid #c89840}
.fin-title{font-size:11px;font-weight:700;color:var(--text2);margin-bottom:8px}
.fin-summary{display:flex;gap:6px;margin-bottom:8px}
.fin-sum-cell{flex:1;background:var(--bg4);border-radius:4px;padding:6px 8px;text-align:center}
.fin-sum-cell .fsc-val{font-size:14px;font-weight:700}
.fin-sum-cell .fsc-lbl{font-size:9px;color:var(--text3);margin-top:1px}
.fin-income .fsc-val{color:#4ec87a}
.fin-expense .fsc-val{color:#c06060}
.fin-balance .fsc-val{color:var(--text)}
.fin-rows{width:100%;border-collapse:collapse;font-size:11px}
.fin-rows th{color:var(--text3);font-weight:500;padding:3px 5px;text-align:left;border-bottom:1px solid var(--border)}
.fin-rows th:last-child,.fin-rows td:last-child{text-align:right}
.fin-rows td{padding:4px 5px;border-bottom:1px solid var(--border);color:var(--text2)}
.fin-rows tr:last-child td{border-bottom:none}
.fin-rows .inc{color:#4ec87a}
.fin-rows .exp{color:#c06060}

/* Stats */
#stats-view{flex:1;overflow-y:auto;padding:14px 16px;scrollbar-width:thin;scrollbar-color:var(--border) transparent}
.cw{background:var(--bg2);border-radius:7px;border:1px solid var(--border);padding:13px;margin-bottom:12px}
.ctitle{font-size:12px;font-weight:500;margin-bottom:9px;color:var(--text)}
.paint-grid{display:flex;flex-direction:column;gap:3px}
.paint-row{display:flex;align-items:center;gap:4px}
.paint-day-lbl{font-size:8px;color:var(--text3);width:24px;flex-shrink:0;text-align:right}
.paint-cells{display:flex;flex-wrap:wrap;gap:1px;flex:1}
.pcell{width:7px;height:7px;border-radius:1px;background:var(--bg3)}
.pcell.filled{opacity:.85}
.bar-chart{display:flex;align-items:flex-end;gap:2px;height:90px}
.bar-col{display:flex;flex-direction:column;align-items:center;flex:1;gap:2px;height:100%}
.bar-body{width:100%;border-radius:2px 2px 0 0;min-height:2px}
.bar-lbl{font-size:8px;color:var(--text3);white-space:nowrap}
.sum-row{display:flex;gap:7px;margin-top:9px;flex-wrap:wrap}
.sum-card{flex:1;min-width:70px;background:var(--bg3);border-radius:5px;padding:9px 11px;border:1px solid var(--border)}
.sum-card .sv{font-size:17px;font-weight:700;color:var(--acc)}
.sum-card .sl{font-size:10px;color:var(--text3);margin-top:2px}

/* Todos view */
#todos-view{flex:1;overflow-y:auto;padding:14px 16px;scrollbar-width:thin;scrollbar-color:var(--border) transparent}
.pri-section{margin-bottom:18px}
.pri-header{display:flex;align-items:center;gap:8px;margin-bottom:8px}
.pri-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.pri-label{font-size:11px;font-weight:700;letter-spacing:.8px;text-transform:uppercase}
.pri-count{font-size:10px;color:var(--text3);margin-left:auto}
.tli{display:flex;align-items:flex-start;gap:8px;padding:7px 10px;background:var(--bg2);border:1px solid var(--border);border-radius:5px;margin-bottom:5px}
.tli-check{width:14px;height:14px;border-radius:3px;border:1.5px solid var(--border2);cursor:pointer;flex-shrink:0;margin-top:1px;display:flex;align-items:center;justify-content:center;transition:all .15s}
.tli-check.done{background:var(--acc);border-color:var(--acc)}
.tli-check.done::after{content:'✓';color:#060e09;font-size:9px;font-weight:700}
.tli-body{flex:1;min-width:0}
.tli-text{font-size:12px;color:var(--text);line-height:1.4}
.tli-text.done{text-decoration:line-through;color:var(--text3)}
.tli-date{font-size:10px;color:var(--text3);margin-top:2px}
.tli-del{background:none;border:none;cursor:pointer;color:var(--text3);font-size:12px;padding:1px 3px;flex-shrink:0}
.tli-del:hover{color:var(--sun)}

/* Search */
#search-view{flex:1;overflow-y:auto;padding:14px 16px;scrollbar-width:thin;scrollbar-color:var(--border) transparent}
.sbar{display:flex;gap:7px;margin-bottom:10px}
.sbar input{flex:1}
.vtoggle{display:flex;gap:5px;margin-bottom:9px}
.sr{padding:9px 11px;background:var(--bg2);border:1px solid var(--border);border-radius:5px;margin-bottom:5px;cursor:pointer;transition:all .15s}
.sr:hover{border-color:var(--acc)}
.sr-date{font-size:10px;color:var(--text3);margin-bottom:2px}
.sr-text{font-size:12px;color:var(--text);line-height:1.5}
.hl{background:#d4a84330;border-radius:2px;padding:0 1px;color:var(--acc)}

/* Settings */
#settings-view{flex:1;overflow-y:auto;padding:14px 16px;scrollbar-width:thin;scrollbar-color:var(--border) transparent}

/* Chips */
.chip{font-size:10px;padding:3px 9px;border-radius:12px;border:1px solid var(--border2);background:var(--bg3);color:var(--text2);cursor:pointer;transition:all .15s;user-select:none}
.chip.on{border-color:var(--acc);background:var(--acc-mid);color:var(--acc)}
.tag-chip{font-size:10px;padding:2px 8px;border-radius:10px;background:var(--bg4);color:var(--acc);border:1px solid var(--border2);display:inline-flex;align-items:center;gap:4px}
.tag-chip .tc-x{cursor:pointer;opacity:.6;font-size:11px}
.tag-chip .tc-x:hover{opacity:1;color:var(--sun)}

/* Hashtag suggest */
.ht-item{padding:8px 12px;font-size:12px;color:var(--text2);cursor:pointer;border-bottom:1px solid var(--border)}
.ht-item:last-child{border-bottom:none}
.ht-item:hover{background:var(--acc-mid);color:var(--acc)}
.ht-tag{color:var(--acc);font-weight:600}
.sv-section{background:var(--bg2);border-radius:7px;border:1px solid var(--border);padding:13px;margin-bottom:14px}
.sv-title{font-size:12px;font-weight:700;color:var(--text);margin-bottom:10px;display:flex;align-items:center;justify-content:space-between}
.sv-item{display:flex;align-items:center;gap:8px;padding:6px 0;border-bottom:1px solid var(--border)}
.sv-item:last-child{border-bottom:none}
.sv-item-label{flex:1;font-size:12px;color:var(--text2)}
.sv-del{background:none;border:none;cursor:pointer;color:var(--text3);font-size:14px;padding:2px 5px;border-radius:3px;transition:color .15s}
.sv-del:hover{color:var(--sun)}
.sv-add-row{display:flex;gap:6px;margin-top:8px}
.sv-add-row input,.sv-add-row select{flex:1}
.cat-swatch{width:10px;height:10px;border-radius:50%;flex-shrink:0}
/* event color swatches */
.ev-color-swatch{width:18px;height:18px;border-radius:50%;cursor:pointer;border:2px solid transparent;transition:border-color .15s;flex-shrink:0}
.ev-color-swatch.on{border-color:rgba(255,255,255,.8)}
.kn-tab{border:none;background:transparent;color:var(--text3);font-size:11px;padding:4px 10px;border-radius:12px;cursor:pointer;font-family:inherit;transition:all .15s;white-space:nowrap}
.kn-tab.active{background:var(--acc-mid);color:var(--acc);font-weight:700}
.kn-tab:hover:not(.active){color:var(--text2)}
.kn-card{background:var(--bg2);border-radius:8px;border:1px solid var(--border);padding:12px;margin-bottom:10px;transition:border-color .15s}
.kn-card:hover{border-color:var(--border2)}
.kn-card-title{font-size:13px;font-weight:500;color:var(--text);margin-bottom:4px;line-height:1.4}
.kn-card-url{font-size:11px;color:var(--text3);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-bottom:5px}
.kn-card-url a{color:#4a80c0;text-decoration:none}.kn-card-url a:hover{text-decoration:underline}
.kn-card-meta{font-size:10px;color:var(--text3);display:flex;align-items:center;gap:8px}
.kn-card-note{font-size:11px;color:var(--text2);margin-top:5px;line-height:1.5;white-space:pre-wrap}
.kn-tag{font-size:9px;padding:2px 7px;border-radius:8px;background:var(--bg3);color:var(--text3);border:1px solid var(--border)}
.kn-actions{display:flex;gap:5px;margin-left:auto}
.kn-del{background:none;border:none;cursor:pointer;color:var(--text3);font-size:11px;padding:2px 5px;font-family:inherit;border-radius:3px;transition:all .15s}
.kn-del:hover{color:var(--sun)}
.kn-quiz{background:var(--bg2);border-radius:8px;border-left:2px solid #4a80c0;border-top:1px solid var(--border);border-right:1px solid var(--border);border-bottom:1px solid var(--border);padding:11px 12px;margin-bottom:8px}
.kn-quiz-text{font-size:13px;color:var(--text);line-height:1.7;white-space:pre-wrap}
.kn-quiz-date{font-size:10px;color:var(--text3);margin-top:5px}
.kn-ent{background:var(--bg2);border-radius:8px;border:1px solid var(--border);padding:12px;margin-bottom:10px;display:flex;align-items:flex-start;gap:10px}
.kn-ent-icon{width:36px;height:36px;border-radius:6px;background:var(--bg3);display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0}
.kn-ent-body{flex:1;min-width:0}
.kn-ent-title{font-size:13px;font-weight:500;color:var(--text);margin-bottom:3px}
.kn-ent-url{font-size:11px;color:var(--text3);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.kn-ent-url a{color:#4a80c0;text-decoration:none}.kn-ent-url a:hover{text-decoration:underline}
.kn-ent-footer{display:flex;align-items:center;gap:6px;margin-top:5px;flex-wrap:wrap}
.kn-ent-cat{font-size:9px;padding:2px 7px;border-radius:8px;background:var(--bg3);color:var(--text3);border:1px solid var(--border)}
.kn-ent.watched{opacity:.4}
.kn-watch-btn{font-size:10px;padding:2px 8px;border-radius:8px;border:1px solid var(--border2);background:transparent;color:var(--text3);cursor:pointer;font-family:inherit;transition:all .15s;white-space:nowrap}
.kn-watch-btn.done{background:var(--acc-mid);border-color:var(--acc);color:var(--acc)}
.kn-watch-btn:hover:not(.done){border-color:var(--acc);color:var(--acc)}
.kn-add-form{background:var(--bg2);border-radius:8px;border:1px solid var(--border);padding:13px;margin-bottom:14px}
.kn-add-form .frow{margin-bottom:8px}
</style>
</head>

function dayData(ds){if(!DATA[ds])DATA[ds]={entries:[],todos:[],finRows:[],events:[]};return DATA[ds];}
function today(){const d=new Date();return fmt(d.getFullYear(),d.getMonth()+1,d.getDate());}
function fmt(y,m,d){return `${y}-${String(m).padStart(2,'0')}-${String(d).padStart(2,'0')}`;}
function esc(s){return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}
function escReg(s){return s.replace(/[.*+?^${}()|[\]\\]/g,'\\$&');}
function fmtYen(n){return Number(n).toLocaleString('ja-JP');}
function getCats(){return SETTINGS.cats||DEFAULT_CATS;}
function getUnits(){return SETTINGS.units||DEFAULT_UNITS;}
function catLabel(id){return (getCats().find(c=>c.id===id)||{label:id}).label;}
function catColor(id){return (getCats().find(c=>c.id===id)||{color:'#506070'}).color;}

// ===== UI INIT =====
function initUI(){
  // Cat nav — exclude diary (has its own view)
  const nav=document.getElementById('cat-nav-items');
  nav.innerHTML=getCats().filter(c=>c.id!=='diary').map(c=>`<div class="nav-item" onclick="filterCat('${c.id}')">
    <div class="cdot-wrap"><div class="cdot" style="background:${c.color}"></div><span class="nav-label">${esc(c.label)}</span></div>
  </div>`).join('');
  // Cat select in rform

  // Unit select

  // Stats cat select
  const sc=document.getElementById('stats-cat');
  sc.innerHTML=`<option value="all">すべて</option>`+getCats().filter(c=>c.id!=='diary').map(c=>`<option value="${c.id}">${esc(c.label)}</option>`).join('');

// ===== CALENDAR =====
function dateAddDays(ds,n){const d=new Date(ds+'T00:00:00');d.setDate(d.getDate()+n);return fmt(d.getFullYear(),d.getMonth()+1,d.getDate());}
function dateDiff(ds1,ds2){return Math.round((new Date(ds2+'T00:00:00')-new Date(ds1+'T00:00:00'))/86400000);}
let calStartDs='',calEndDs='',busy=false;
const GRID_ID='cal-grid-main';

function buildCal(){
  const scr=document.getElementById('cal-scroll');
  scr.innerHTML=`<div id="${GRID_ID}" class="cal-grid-single"></div>`;
  const todayDs=today();
  let startDs=dateAddDays(todayDs,-90);
  const sd=new Date(startDs+'T00:00:00');
  startDs=dateAddDays(startDs,-sd.getDay());
  calStartDs=startDs;calEndDs=startDs;
  appendDays(startDs,dateAddDays(todayDs,180));
  setTimeout(()=>{scrollToToday();updateCalHeader();},80);
}

function appendDays(fromDs,toDs){
  const grid=document.getElementById(GRID_ID);if(!grid)return;
  let html='',ds=fromDs;
  while(dateDiff(ds,toDs)>=0){
    const d=new Date(ds+'T00:00:00');
    html+=dcell(ds,d.getDate(),ds===today()?'today':'',d.getDay());
    ds=dateAddDays(ds,1);
  }
  grid.insertAdjacentHTML('beforeend',html);
  calEndDs=toDs;
}

function prependDays(fromDs,toDs){
  const grid=document.getElementById(GRID_ID);if(!grid)return;
  const fd=new Date(fromDs+'T00:00:00');
  const sf=dateAddDays(fromDs,-fd.getDay());
  let html='',ds=sf;
  while(dateDiff(ds,toDs)>=0){
    const d=new Date(ds+'T00:00:00');
    html+=dcell(ds,d.getDate(),ds===today()?'today':'',d.getDay());
    ds=dateAddDays(ds,1);
  }
  const temp=document.createElement('div');temp.innerHTML=html;
  const scr=document.getElementById('cal-scroll');
  const oldH=scr.scrollHeight,oldTop=scr.scrollTop;
  while(temp.lastChild)grid.insertBefore(temp.lastChild,grid.firstChild);
  calStartDs=sf;
  scr.scrollTop=oldTop+(scr.scrollHeight-oldH);
}

function dcell(ds,num,extra,dow){
  const d=DATA[ds]||{};
  const entries=(d.entries||[]).filter(e=>e.cat!=='finance');
  const hasFinance=(d.finRows||[]).length>0;
  const events=(d.events||[]);
  const allTodos=(d.todos||[]).filter(t=>!t.done);
  const PRI_ORDER={now:0,later:1,someday:2};
  const sortedTodos=[...allTodos].sort((a,b)=>(PRI_ORDER[a.pri||'later'])-(PRI_ORDER[b.pri||'later']));
  const holiday=getHoliday(ds);
  const dc=dow===0?'sun':dow===6?'sat':(holiday?'hol':'');

  // dots show what is NOT in the main display (opposite side)
  let dots='';
  if(calMode==='future'){
    const recCats=[...new Set(entries.map(e=>e.cat))];
    if(hasFinance)recCats.push('finance');
    dots=recCats.map(c=>`<div class="dot dot-${c}"></div>`).join('');
  } else {
    if(events.length)dots+=`<div class="dot" style="background:#4a80c0"></div>`;
    if(allTodos.length)dots+=`<div class="dot" style="background:#c89840"></div>`;
  }

  let lines=[];
  if(calMode==='past'){
    lines=entries.slice(0,5).map(e=>`<div class="epreview">${esc(e.text||'').substring(0,20)}</div>`);
  } else {
    events.slice(0,5).forEach(e=>{
      lines.push(`<div class="evpreview">${e.start?e.start+' ':''}${esc(e.title||'').substring(0,16)}</div>`);
    });
    if(lines.length<5){
      sortedTodos.slice(0,5-lines.length).forEach(t=>{
        const priCol=t.pri==='now'?'#d87070':t.pri==='someday'?'#8aabcc':'#c8a860';
        lines.push(`<div class="tpreview" style="color:${priCol}">${esc(t.text||'').substring(0,18)}</div>`);
      });
    }
  }
  const holHtml=holiday?`<span class="hol-name">${esc(holiday)}</span>`:'';
  return `<div class="cal-day ${extra} ${dc}" onclick="openDay('${ds}')" id="day-${ds}">
    <div class="day-num">${num}${holHtml}</div>
    <div class="dot-row">${dots}</div>
    <div class="cell-lines">${lines.join('')}</div>
  </div>`;
}

function setCalMode(m){
  calMode=m;
  document.getElementById('pill-future').classList.toggle('on',m==='future');
  document.getElementById('pill-past').classList.toggle('on',m==='past');
  _lastYM='';
  rebuildCellContents();
  setTimeout(updateCalHeader,50);
}

function rebuildCellContents(){
  const grid=document.getElementById(GRID_ID);if(!grid)return;
  grid.querySelectorAll('.cal-day').forEach(el=>{
    const ds=el.id.replace('day-','');
    const d=new Date(ds+'T00:00:00');
    el.outerHTML=dcell(ds,d.getDate(),ds===today()?'today':'',d.getDay());
  });
}

function scrollToToday(){
  if(calViewMode==='week'){
    const t=today();const dd=new Date(t+'T00:00:00');
    weekStartDs=dateAddDays(t,-dd.getDay());
    renderWeekView();return;
  }
  const todayDs=today();
  const d=new Date(todayDs+'T00:00:00');
  const firstOfMonth=fmt(d.getFullYear(),d.getMonth()+1,1);
  const firstEl=document.getElementById('day-'+firstOfMonth);
  const scr=document.getElementById('cal-scroll');
  if(firstEl&&scr){
    const cellH=firstEl.offsetHeight||90;
    const elTop=firstEl.getBoundingClientRect().top-scr.getBoundingClientRect().top+scr.scrollTop;
    scr.scrollTo({top:elTop-cellH,behavior:'smooth'});
  }
  const ym=`${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}`;
  document.getElementById('cal-year-month').textContent=`${d.getFullYear()}/${String(d.getMonth()+1).padStart(2,'0')}`;
  _lastYM=''; // force re-apply
  applyDimMonth(ym);
}

let _lastYM='';
function applyDimMonth(ym){
  if(_lastYM===ym)return;
  _lastYM=ym;
  const grid=document.getElementById(GRID_ID);if(!grid)return;
  grid.querySelectorAll('.cal-day').forEach(c=>{
    const ds=c.id.replace('day-','');
    const d=new Date(ds+'T00:00:00');
    const cym=`${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}`;
    c.classList.toggle('dim-month',cym!==ym);
  });
}

function updateCalHeader(){
  const scr=document.getElementById('cal-scroll');
  const grid=document.getElementById(GRID_ID);if(!grid)return;
  const scrRect=scr.getBoundingClientRect();
  const midY=scrRect.top+scrRect.height/2;
  const cells=grid.querySelectorAll('.cal-day');
  let ym='';
  for(const c of cells){
    const r=c.getBoundingClientRect();
    if(r.top<=midY&&r.bottom>midY){
      const ds=c.id.replace('day-','');
      const d=new Date(ds+'T00:00:00');
      ym=`${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}`;
      document.getElementById('cal-year-month').textContent=`${d.getFullYear()}/${String(d.getMonth()+1).padStart(2,'0')}`;
      break;
    }
  }
  if(!ym){
    for(const c of cells){
      const r=c.getBoundingClientRect();
      if(r.bottom>scrRect.top){
        const ds=c.id.replace('day-','');
        const d=new Date(ds+'T00:00:00');
        ym=`${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}`;
        document.getElementById('cal-year-month').textContent=`${d.getFullYear()}/${String(d.getMonth()+1).padStart(2,'0')}`;
        break;
      }
    }
  }
  if(ym)applyDimMonth(ym);
}

function handleScroll(){
  updateCalHeader();
  if(busy)return;
  const scr=document.getElementById('cal-scroll');
  if(scr.scrollTop+scr.clientHeight>scr.scrollHeight-800){
    busy=true;appendDays(dateAddDays(calEndDs,1),dateAddDays(calEndDs,60));busy=false;
  }
  if(scr.scrollTop<800){
    busy=true;prependDays(dateAddDays(calStartDs,-60),dateAddDays(calStartDs,-1));busy=false;
  }
}

function refreshCell(ds){
  const el=document.getElementById('day-'+ds);if(!el)return;
  const d=new Date(ds+'T00:00:00');
  const newEl=document.createElement('div');
  newEl.innerHTML=dcell(ds,d.getDate(),ds===today()?'today':'',d.getDay());
  el.replaceWith(newEl.firstChild);
}

// ===== PANEL =====
function openDay(ds){
  currentDate=ds;
  const d=new Date(ds+'T00:00:00');
  document.getElementById('panel-date').textContent=`${d.getFullYear()}年${d.getMonth()+1}月${d.getDate()}日（${DAYS[d.getDay()]}）`;
  setPanelTab(panelTab);
  document.getElementById('panel').classList.add('open');
}
function closePanel(){document.getElementById('panel').classList.remove('open');currentDate=null;}

let _lastTabClick={tab:'',time:0};
function handlePanelTabClick(tab){
  const now=Date.now();
  if(panelTab===tab && now-_lastTabClick.time<500){
    // double-tap on active tab → open add form
    if(tab==='event'){showAddEvent();}
    else if(tab==='todo'){showAddTodo();}
    else if(tab==='record'){
      // scroll rform into view
      setTimeout(()=>document.getElementById('rform').scrollIntoView({behavior:'smooth',block:'nearest'}),50);
    }
  } else {
    setPanelTab(tab);
  }
  _lastTabClick={tab,time:now};
}

function setPanelTab(tab){
  panelTab=tab;
  ['event','todo','record'].forEach(t=>{
    document.getElementById(`ptab-${t}`).classList.toggle('active',t===tab);
    document.getElementById(`ptab-${t}-body`).style.display=t===tab?'block':'none';
  });
  document.getElementById('rform').style.display=tab==='record'?'block':'none';
  renderPanel();
}

function renderPanel(){
  if(!currentDate)return;
  const d=dayData(currentDate);

  // Events
  let evh='';
  if(!(d.events||[]).length)evh='<div class="empty">予定はありません</div>';
  else(d.events||[]).forEach((ev,i)=>{
    const timeStr=ev.allday?'終日':ev.start?(ev.end?`${ev.start}〜${ev.end}`:ev.start):'';
    const evColor=ev.color||'#3060a8';
    evh+=`<div class="evcard" id="evcard-${i}" style="border-left-color:${evColor}" ondblclick="startEditEvent(${i})" onclick="handleEvTap(${i},event)">
      <div class="evtime" style="color:${evColor}">${timeStr}</div>
      <div class="evtitle">${esc(ev.title||'')}</div>
      ${ev.note?`<div class="evnote">${esc(ev.note)}</div>`:''}
      ${ev.repeat&&ev.repeat!=='none'?`<div class="evnote" style="color:var(--text3)">🔁 ${ev.repeat==='daily'?'毎日':ev.repeat==='weekly'?'毎週':'毎月'}</div>`:''}
      <div class="evactions">
        <button class="eact" onclick="event.stopPropagation();startEditEvent(${i})">編集</button>
        <button class="eact del" onclick="event.stopPropagation();delEvent(${i})">削除</button>
      </div>
    </div>`;
  });
  document.getElementById('event-list').innerHTML=evh;

  // Todos
  let th='';
  if(!(d.todos||[]).length)th='<div class="empty">TODOはありません</div>';
  else d.todos.forEach((t,i)=>{
    const pri=t.pri||'later';
    const timeStr=t.tstart?(t.tend?`${t.tstart}〜${t.tend}`:t.tstart):'';
    const doneClass=t.done?'done':'';
    th+=`<div class="todo-item" id="todo-item-${i}" ondblclick="startEditTodo(${i})" onclick="handleTodoTap(${i},event)">
      <div class="tcheck ${doneClass} ${t.done?'':'pri-'+pri}" onclick="event.stopPropagation();toggleTodo(${i})"></div>
      <div style="flex:1;min-width:0">
        <span class="ttext pri-${pri} ${doneClass}">${esc(t.text)}</span>
        ${timeStr?`<div class="ttmeta">${timeStr}</div>`:''}
      </div>
      <span class="tdel" onclick="event.stopPropagation();delTodo(${i})">×</span>
    </div>`;
  });
  document.getElementById('todo-list').innerHTML=th;

  // Records
  const nonFin=(d.entries||[]).filter(e=>e.cat!=='finance');
  let eh='';
  if(!nonFin.length&&!(d.finRows||[]).length)eh='<div class="empty">記録がありません</div>';
  nonFin.slice().reverse().forEach((e,ri_)=>{
    const ri=d.entries.indexOf(e);
    eh+=`<div class="ecard cat-${e.cat}" id="ecard-${ri}">
      <div class="clabel"><span class="badge b-${e.cat}">${catLabel(e.cat)}</span></div>
      <div class="etext">${esc(e.text)}</div>
      ${e.num!==undefined?`<div class="emeta"><span>▶ ${e.num} ${e.unit||''}</span></div>`:''}
      <div class="emeta"><span>${e.time||''}</span>
        <div class="eactions">
          <button class="eact" onclick="startEdit(${ri})">編集</button>
          <button class="eact del" onclick="delEntry(${ri})">削除</button>
        </div>
      </div>
    </div>`;
  });
  if((d.finRows||[]).length)eh+=renderFinCard(d);
  document.getElementById('entry-list').innerHTML=eh;
}

// Events
// event double-tap
const _evTapState={idx:-1,time:0};
function handleEvTap(i,e){
  const now=Date.now();
  if(_evTapState.idx===i&&now-_evTapState.time<400){
    startEditEvent(i);
    _evTapState.idx=-1;
  } else {
    _evTapState.idx=i;
    _evTapState.time=now;
  }
}

function startEditEvent(i){
  if(!currentDate)return;
  const ev=dayData(currentDate).events?.[i];if(!ev)return;
  const el=document.getElementById(`evcard-${i}`);if(!el)return;
  const repeatOpts=['none','daily','weekly','monthly'].map(v=>
    `<option value="${v}"${(ev.repeat||'none')===v?' selected':''}>${v==='none'?'なし':v==='daily'?'毎日':v==='weekly'?'毎週':'毎月'}</option>`).join('');
  const SWATCH_COLORS=['#3060a8','#6b4fa8','#3a8a6a','#a86030','#a83060','#507888'];
  const swatches=SWATCH_COLORS.map(col=>`<div class="ev-color-swatch${(ev.color||'#3060a8')===col?' on':''}" data-color="${col}" style="background:${col}" onclick="this.parentNode.querySelectorAll('.ev-color-swatch').forEach(s=>s.classList.remove('on'));this.classList.add('on')"></div>`).join('');
  el.innerHTML=`<div class="edit-form">
    <div class="frow"><label class="flabel">タイトル</label><input type="text" id="ev-edit-title-${i}" value="${esc(ev.title||'')}"></div>
    <div class="frow">
      <label class="flabel" style="display:flex;align-items:center;gap:6px;cursor:pointer">
        <input type="checkbox" id="ev-edit-allday-${i}" style="width:auto;margin:0" ${ev.allday?'checked':''} onchange="document.getElementById('ev-edit-time-row-${i}').style.display=this.checked?'none':'flex'"> 終日
      </label>
    </div>
    <div id="ev-edit-time-row-${i}" class="frow" style="display:${ev.allday?'none':'flex'};gap:7px">
      <div style="flex:1"><label class="flabel">開始</label><input type="time" id="ev-edit-start-${i}" value="${ev.start||''}"></div>
      <div style="flex:1"><label class="flabel">終了</label><input type="time" id="ev-edit-end-${i}" value="${ev.end||''}"></div>
    </div>
    <div class="frow"><label class="flabel">繰り返し</label><select id="ev-edit-repeat-${i}">${repeatOpts}</select></div>
    <div class="frow"><label class="flabel">色</label><div id="ev-edit-color-${i}" style="display:flex;gap:5px;padding-top:2px">${swatches}</div></div>
    <div class="frow"><label class="flabel">メモ</label><textarea id="ev-edit-note-${i}" rows="2">${esc(ev.note||'')}</textarea></div>
    <div class="ebtns">
      <button class="btn primary" style="flex:1;font-size:11px" onclick="saveEditEvent(${i})">保存</button>
      <button class="btn" style="font-size:11px" onclick="renderPanel()">キャンセル</button>
    </div>
  </div>`;
}

function saveEditEvent(i){
  if(!currentDate)return;
  const events=dayData(currentDate).events;if(!events?.[i])return;
  const title=document.getElementById(`ev-edit-title-${i}`).value.trim();
  if(!title)return;
  const allday=document.getElementById(`ev-edit-allday-${i}`).checked;
  const colorEl=document.querySelector(`#ev-edit-color-${i} .ev-color-swatch.on`);
  events[i]={
    title,
    allday,
    start:allday?'':document.getElementById(`ev-edit-start-${i}`).value,
    end:allday?'':document.getElementById(`ev-edit-end-${i}`).value,
    repeat:document.getElementById(`ev-edit-repeat-${i}`).value,
    note:document.getElementById(`ev-edit-note-${i}`).value.trim(),
    color:colorEl?colorEl.dataset.color:'#3060a8',
  };
  events.sort((a,b)=>(a.allday?'00:00':a.start||'99').localeCompare(b.allday?'00:00':b.start||'99'));
  saveData();
  renderPanel();
  refreshCell(currentDate);
  if(calViewMode==='week')renderWeekView();
}

function openDayAtTime(ds, h, half){
  openDay(ds);
  setPanelTab('event');
  // pre-fill start/end time in the add event form
  showAddEvent();
  const startH=String(h).padStart(2,'0');
  const startM=half===0?'00':'30';
  const endH=String(half===1?h+1:h).padStart(2,'0');
  const endM=half===1?'00':'30';
  const startEl=document.getElementById('ev-start');
  const endEl=document.getElementById('ev-end');
  if(startEl)startEl.value=`${startH}:${startM}`;
  if(endEl)endEl.value=`${endH}:${endM}`;
  // focus title
  setTimeout(()=>{
    const t=document.getElementById('ev-title');
    if(t)t.focus();
  },100);
}

function showAddEvent(){
  const f=document.getElementById('add-event-form');
  const h=f.style.display==='none';
  f.style.display=h?'block':'none';
  if(h)setTimeout(()=>document.getElementById('ev-title').focus(),50);
}
function toggleEvAllDay(){
  const allday=document.getElementById('ev-allday').checked;
  document.getElementById('ev-time-row').style.display=allday?'none':'flex';
}
function selectEvColor(el){
  document.querySelectorAll('#ev-color-picker .ev-color-swatch').forEach(s=>s.classList.remove('on'));
  el.classList.add('on');
}
function getSelectedEvColor(){
  const s=document.querySelector('#ev-color-picker .ev-color-swatch.on');
  return s?s.dataset.color:'#3060a8';
}

function saveEvent(){
  if(!currentDate)return;
  const title=document.getElementById('ev-title').value.trim();
  if(!title)return;
  const allday=document.getElementById('ev-allday').checked;
  const start=allday?'':document.getElementById('ev-start').value;
  const end=allday?'':document.getElementById('ev-end').value;
  const note=document.getElementById('ev-note').value.trim();
  const repeat=document.getElementById('ev-repeat').value;
  const color=getSelectedEvColor();
  const ev={title,start,end,note,allday,repeat,color};
  const dd=dayData(currentDate);
  if(!dd.events)dd.events=[];
  dd.events.push(ev);
  dd.events.sort((a,b)=>(a.allday?'00:00':a.start||'').localeCompare(b.allday?'00:00':b.start||''));
  document.getElementById('ev-title').value='';
  document.getElementById('ev-start').value='';
  document.getElementById('ev-end').value='';
  document.getElementById('ev-note').value='';
  document.getElementById('ev-allday').checked=false;
  document.getElementById('ev-repeat').value='none';
  document.getElementById('ev-time-row').style.display='flex';
  document.getElementById('add-event-form').style.display='none';
  // reset color to first
  document.querySelectorAll('#ev-color-picker .ev-color-swatch').forEach((s,i)=>s.classList.toggle('on',i===0));
  saveData();renderPanel();refreshCell(currentDate);
  if(calViewMode==='week')renderWeekView();
}
function delEvent(i){
  if(!currentDate)return;
  dayData(currentDate).events.splice(i,1);
  saveData();renderPanel();refreshCell(currentDate);
  if(calViewMode==='week')renderWeekView();
}

// Todos
// todo double-tap (mobile: two taps within 400ms; desktop: dblclick)
const _todoTapState={idx:-1,time:0};
function handleTodoTap(i,e){
  const now=Date.now();
  if(_todoTapState.idx===i && now-_todoTapState.time<400){
    startEditTodo(i);
    _todoTapState.idx=-1;
  } else {
    _todoTapState.idx=i;
    _todoTapState.time=now;
  }
}

function startEditTodo(i){
  if(!currentDate)return;
  const t=dayData(currentDate).todos[i];if(!t)return;
  const el=document.getElementById(`todo-item-${i}`);if(!el)return;
  const priOpts=['now','later','someday'].map(p=>`<option value="${p}"${(t.pri||'later')===p?' selected':''}>${p==='now'?'今すぐ':p==='later'?'あとで':'できるとき'}</option>`).join('');
  el.outerHTML=`<div id="todo-edit-${i}" style="padding:6px 0;border-bottom:1px solid var(--border)">
    <input type="text" id="todo-edit-text-${i}" value="${esc(t.text)}" style="margin-bottom:5px" onfocus="scrollFormIntoView('todo-edit-text-${i}')">

// Generic tag input for game/book — plain text, no # required
function getTagList(catId){
  const freq={};
  Object.values(DATA).forEach(d=>{
    (d.entries||[]).forEach(e=>{
      if(e.cat===catId){
        (e.tags||[]).forEach(t=>{freq[t]=(freq[t]||0)+1;});
      }
    });
  });
  return Object.entries(freq).sort((a,b)=>b[1]-a[1]).map(([t])=>t);
}

// ===== DIARY HASHTAG =====
function getHashtagFreq(){
  const freq={};
  Object.values(DATA).forEach(d=>{
    (d.entries||[]).forEach(e=>{
      if(e.cat==='diary'){
        const matches=(e.text||'').match(/#[\w\u3040-\u9fff\u30a0-\u30ff]+/g)||[];
        matches.forEach(t=>{freq[t]=(freq[t]||0)+1;});
      }
    });
  });
  return freq;
}

function onDiaryInput(el){
  const len=el.value.length;
  const cc=document.getElementById('diary-charcount');
  cc.textContent=len>0?`${len}文字`:'';
  cc.style.color=len>280?'var(--sun)':'var(--text3)';

  const pos=el.selectionStart;
  const before=el.value.slice(0,pos);
  const match=before.match(/#([\w\u3040-\u9fff\u30a0-\u30ff]*)$/);
  const suggest=document.getElementById('hashtag-suggest');

  const freq=getHashtagFreq();
  const sortedByFreq=Object.entries(freq).sort((a,b)=>b[1]-a[1]).map(([t])=>t);

  if(match){
    const q=(match[1]||'').toLowerCase();
    // if user typed just '#' with no chars yet → show top3
    // if typed chars → show prefix-match up to 5
    let filtered;
    if(q===''){
      filtered=sortedByFreq.slice(0,3);
    } else {
      filtered=sortedByFreq.filter(t=>t.slice(1).toLowerCase().startsWith(q)).slice(0,5);
      // if no prefix match, fall back to include-match
      if(!filtered.length)filtered=sortedByFreq.filter(t=>t.slice(1).toLowerCase().includes(q)).slice(0,5);
    }
    if(filtered.length){
      suggest.style.display='block';
      suggest.innerHTML=filtered.map(t=>`<div class="ht-item" onmousedown="insertHashtag('${esc(t)}')"><span class="ht-tag">${esc(t)}</span> <span style="font-size:9px;color:var(--text3)">${freq[t]}回</span></div>`).join('');
    } else suggest.style.display='none';
  } else suggest.style.display='none';
}

function insertHashtag(tag){
  const el=document.getElementById('rec-text-diary');
  const pos=el.selectionStart;
  const before=el.value.slice(0,pos).replace(/#[\w\u3040-\u9fff\u30a0-\u30ff]*$/,tag+' ');
  const after=el.value.slice(pos);
  el.value=before+after;
  el.setSelectionRange(before.length,before.length);
  document.getElementById('hashtag-suggest').style.display='none';
  el.focus();onDiaryInput(el);
}

function saveRecord(){
  if(!currentDate)return;
  const cat=document.getElementById('rec-cat').value;
  const now=new Date();
  const time=`${String(now.getHours()).padStart(2,'0')}:${String(now.getMinutes()).padStart(2,'0')}`;
  // save mood/condition if set
  const moodEl=document.getElementById('rec-mood');
  const condEl=document.getElementById('rec-cond');
  const dd=dayData(currentDate);
  if(moodEl.value) dd.mood=parseInt(moodEl.value);
  if(condEl.value) dd.cond=parseInt(condEl.value);
  if(cat==='finance'){
    const desc=document.getElementById('fin-desc').value.trim();
    const amount=parseFloat(document.getElementById('fin-amount').value);
    if(!desc||isNaN(amount)||amount<=0)return;
    const isIncome=document.getElementById('fin-is-income').checked;
    const type=isIncome?'income':'expense';
    const subcat=isIncome?(document.getElementById('fin-type-income').value):document.getElementById('fin-subcat').value;
    const dd=dayData(currentDate);
    if(!dd.finRows)dd.finRows=[];
    dd.finRows.push({desc,amount,type,subcat,time});
    document.getElementById('fin-desc').value='';
    document.getElementById('fin-amount').value='';
    document.getElementById('fin-is-income').checked=false;
    document.getElementById('fin-income-label').style.display='none';
  }else{
    const isDiary=cat==='diary';
    const isGameOrBook=(cat==='game'||cat==='book');
    const textEl=isDiary?document.getElementById('rec-text-diary'):document.getElementById('rec-text');
    const baseText=textEl.value.trim();
    // tags (safe access)
    if(!_activeTags[cat])_activeTags[cat]=[];
    const tags=_activeTags[cat];
    // study sub
    const studySub=document.getElementById('study-sub-chips')?.dataset?.active||'';
    // build final text
    let text=baseText;
    if(cat==='study'&&studySub) text=`[${studySub}] ${text}`.trim();
    if(tags.length) text=(text+(text?' ':'')+tags.join(' ')).trim();
    // for game/book: tags alone are enough; for others: text required
    if(!text&&!isGameOrBook)return;
    if(!text&&isGameOrBook) text='—'; // fallback so entry isn't empty
    const numVal=isDiary?'':document.getElementById('rec-num').value;
    const unit=document.getElementById('rec-unit').value;
    const entry={cat,text,time};
    if(numVal){entry.num=parseFloat(numVal);entry.unit=unit;}
    if(tags.length)entry.tags=[...tags];
    dayData(currentDate).entries.push(entry);
    textEl.value='';
    if(!isDiary)document.getElementById('rec-num').value='';
    if(isDiary){const cc=document.getElementById('diary-charcount');if(cc)cc.textContent='';}
    if(cat==='study'){const chips=document.getElementById('study-sub-chips');if(chips){chips.dataset.active='';chips.querySelectorAll('.chip').forEach(c=>c.classList.remove('on'));}}
    _activeTags[cat]=[];renderTagChips(cat);
  }
  saveData();renderPanel();refreshCell(currentDate);
}

function getMonthDates(y,m){
  const dates=[];
  const last=new Date(y,m+1,0).getDate();
  for(let d=1;d<=last;d++)dates.push(fmt(y,m+1,d));
  return dates;
}

function renderStats(){
  const cat=document.getElementById('stats-cat').value;
  const sv=document.getElementById('stats-view');
  const isFinance=cat==='finance';

  // toggle period/month selectors
  document.getElementById('stats-period-wrap').style.display=isFinance?'none':'inline';
  const fw=document.getElementById('stats-fin-wrap');
  fw.style.display=isFinance?'flex':'none';

  if(isFinance){
    const lbl=document.getElementById('fin-month-lbl');
    lbl.textContent=`${finMonth.getFullYear()}/${String(finMonth.getMonth()+1).padStart(2,'0')}`;
    renderFinanceStats(getMonthDates(finMonth.getFullYear(),finMonth.getMonth()),sv);
    return;
  }

  const days=parseInt(document.getElementById('stats-period').value);
  const end=new Date(),start=new Date();
  start.setDate(end.getDate()-days+1);
  const dates=[];
  for(let d=new Date(start);d<=end;d.setDate(d.getDate()+1))dates.push(fmt(d.getFullYear(),d.getMonth()+1,d.getDate()));

  function hasRec(ds){
    const d=DATA[ds];if(!d)return false;
    if(cat==='all')return(d.entries||[]).some(e=>e.cat!=='finance'&&e.cat!=='diary')||(d.finRows||[]).length>0;
    if(cat==='diary')return(d.entries||[]).some(e=>e.cat==='diary');
    return(d.entries||[]).some(e=>e.cat===cat);
  }
  const activeDays=dates.filter(hasRec).length;

  // ── PAINT GRID: filled cells only, no empty placeholders ──
  function buildPaint(minutes, color, label){
    if(minutes<=0) return '';
    const cells=Math.round(minutes/10);
    const cellsHtml=Array.from({length:cells},()=>`<div class="pcell filled" style="background:${color}"></div>`).join('');
    return `<div class="cw">
      <div class="ctitle" style="display:flex;align-items:center;justify-content:space-between">
        <span>${label}</span>
        <span style="font-size:11px;color:var(--acc);font-weight:700">${Math.floor(minutes/60)}h ${minutes%60}m</span>
      </div>
      <div style="display:flex;flex-wrap:wrap;gap:1px">${cellsHtml}</div>
    </div>`;
  }

  if(cat==='all'){

      const topWords=Object.entries(wfreq).sort((a,b)=>b[1]-a[1]).slice(0,40);
      if(topWords.length){

    if(isTagCat){

      dates.forEach(ds=>{
        const d=DATA[ds];if(!d)return;
        (d.entries||[]).filter(e=>e.cat===cat).forEach(e=>{
          (e.tags||[]).forEach(t=>{tagCount[t]=(tagCount[t]||0)+1;});
        });

        html+=`<div class="cw"><div class="ctitle" style="display:flex;justify-content:space-between"><span>タイトル別</span><span style="font-size:11px;color:${catColor(cat)};font-weight:700">計${total}回</span></div>${rows}</div>`;
      } else {
        html+='<div class="empty" style="padding:28px">記録がありません</div>';
      }
    } else {
      const numData={};
      dates.forEach(ds=>{const d=DATA[ds];if(!d)return;(d.entries||[]).forEach(e=>{if(e.cat!==cat||e.num===undefined)return;if(!numData[e.cat])numData[e.cat]={vals:[],unit:'',total:0,count:0};numData[e.cat].vals.push({ds,val:e.num});numData[e.cat].unit=e.unit||'';numData[e.cat].total+=e.num;numData[e.cat].count++;});});
      Object.entries(numData).forEach(([c,nd])=>{
        const max=Math.max(...nd.vals.map(v=>v.val),1);const byDate={};nd.vals.forEach(v=>byDate[v.ds]=v.val);
        const recent=dates.slice(-28);const col2=catColor(c);
        html+=`<div class="cw"><div class="ctitle">${catLabel(c)} — 直近28日（${nd.unit}）</div><div class="bar-chart">`;
        recent.forEach(ds=>{const v=byDate[ds]||0;const h=v?Math.max(6,Math.round((v/max)*100)):2;html+=`<div class="bar-col"><div style="flex:1;display:flex;align-items:flex-end"><div class="bar-body" style="height:${h}%;background:${v?col2:'#1d2c4a'};width:100%"></div></div><div class="bar-lbl">${new Date(ds+'T00:00:00').getDate()}</div></div>`;});
        html+=`</div><div class="sum-row"><div class="sum-card"><div class="sv">${nd.total.toLocaleString()}</div><div class="sl">累計 ${nd.unit}</div></div><div class="sum-card"><div class="sv">${nd.count>0?(nd.total/nd.count).toFixed(1):'0'}</div><div class="sl">平均/日</div></div><div class="sum-card"><div class="sv">${nd.count}</div><div class="sl">記録回数</div></div></div></div>`;

function renderFinanceStats(dates,sv){
  let totalIncome=0,totalExpense=0;const subcatTotals={};const recent=dates.slice(-28);const byDate={};
  dates.forEach(ds=>{const d=DATA[ds];if(!d||!d.finRows)return;d.finRows.forEach(r=>{if(r.type==='income')totalIncome+=r.amount;else totalExpense+=r.amount;const k=r.subcat||'その他';if(!subcatTotals[k])subcatTotals[k]={income:0,expense:0};if(r.type==='income')subcatTotals[k].income+=r.amount;else subcatTotals[k].expense+=r.amount;if(recent.includes(ds)){if(!byDate[ds])byDate[ds]={income:0,expense:0};if(r.type==='income')byDate[ds].income+=r.amount;else byDate[ds].expense+=r.amount;}});});
  const balance=totalIncome-totalExpense;const balCol=balance>=0?'color:#7b84b0':'color:#c06060';
  const maxBar=Math.max(...recent.map(ds=>Math.max((byDate[ds]?.income||0),(byDate[ds]?.expense||0))),1);
  const activeDays=dates.filter(ds=>{const d=DATA[ds];return d&&d.finRows&&d.finRows.length;}).length;
  let html=`<div class="cw"><div class="ctitle">家計簿サマリー</div><div class="fin-summary" style="margin-bottom:0"><div class="fin-sum-cell fin-income"><div class="fsc-val">+${fmtYen(totalIncome)}</div><div class="fsc-lbl">収入</div></div><div class="fin-sum-cell fin-expense"><div class="fsc-val">-${fmtYen(totalExpense)}</div><div class="fsc-lbl">支出</div></div><div class="fin-sum-cell fin-balance"><div class="fsc-val" style="${balCol}">${balance>=0?'+':''}${fmtYen(balance)}</div><div class="fsc-lbl">収支</div></div></div></div>`;
  html+=`<div class="cw"><div class="ctitle">収支グラフ — 直近28日</div><div class="bar-chart">`;
  recent.forEach(ds=>{const inc=byDate[ds]?.income||0;const exp=byDate[ds]?.expense||0;const hI=inc?Math.max(4,Math.round((inc/maxBar)*90)):0;const hE=exp?Math.max(4,Math.round((exp/maxBar)*90)):0;html+=`<div class="bar-col"><div style="flex:1;display:flex;align-items:flex-end;gap:1px"><div style="flex:1;background:${hI?'#7b84b0':'#1d2c4a'};height:${hI||2}%;border-radius:2px 2px 0 0;min-height:2px"></div><div style="flex:1;background:${hE?'#c06060':'#1d2c4a'};height:${hE||2}%;border-radius:2px 2px 0 0;min-height:2px"></div></div><div class="bar-lbl">${new Date(ds+'T00:00:00').getDate()}</div></div>`;});
  html+=`</div><div style="display:flex;gap:12px;margin-top:7px;font-size:10px;color:var(--text3)"><span><span style="display:inline-block;width:8px;height:8px;background:#7b84b0;border-radius:2px;margin-right:3px"></span>収入</span><span><span style="display:inline-block;width:8px;height:8px;background:#c06060;border-radius:2px;margin-right:3px"></span>支出</span></div></div>`;
  if(Object.keys(subcatTotals).length){const maxSub=Math.max(...Object.values(subcatTotals).map(v=>v.expense),1);html+=`<div class="cw"><div class="ctitle">カテゴリ別支出</div>`;Object.entries(subcatTotals).filter(([,v])=>v.expense>0).sort((a,b)=>b[1].expense-a[1].expense).forEach(([k,v])=>{const pct=Math.round((v.expense/maxSub)*100);html+=`<div style="margin-bottom:8px"><div style="display:flex;justify-content:space-between;font-size:11px;margin-bottom:3px"><span style="color:var(--text2)">${esc(k)}</span><span style="color:#c06060">-${fmtYen(v.expense)}円</span></div><div style="height:5px;background:var(--bg3);border-radius:3px;overflow:hidden"><div style="height:100%;width:${pct}%;background:#c06060;border-radius:3px;opacity:.7"></div></div></div>`;});html+=`</div>`;}
  sv.innerHTML=html;
}

function renderTodosView(){
  const sv=document.getElementById('todos-view');
  const PRI={now:{label:'今すぐ',col:'#c06060'},later:{label:'あとで',col:'#c89840'},someday:{label:'できるとき',col:'#4a80c0'}};
  const buckets={now:[],later:[],someday:[]};
  Object.entries(DATA).forEach(([ds,d])=>{(d.todos||[]).forEach((t,i)=>{const pri=t.pri||'later';if(buckets[pri])buckets[pri].push({ds,i,t});});});
  Object.values(buckets).forEach(b=>b.sort((a,z)=>a.ds.localeCompare(z.ds)));
  let html='';
  ['now','later','someday'].forEach(pri=>{
    const items=buckets[pri];const{label,col}=PRI[pri];const pending=items.filter(x=>!x.t.done);
    html+=`<div class="pri-section"><div class="pri-header"><div class="pri-dot" style="background:${col}"></div><span class="pri-label" style="color:${col}">${label}</span><span class="pri-count">${pending.length}件</span></div>`;
    if(!items.length)html+=`<div style="font-size:11px;color:var(--text3);padding:6px 0">なし</div>`;
    else items.forEach(({ds,i,t})=>{
      const d=new Date(ds+'T00:00:00');const dateStr=`${d.getMonth()+1}/${d.getDate()}`;
      const timeStr=t.tstart?(t.tend?`${t.tstart}〜${t.tend}`:t.tstart):'';
      html+=`<div class="tli"><div class="tli-check ${t.done?'done':''}" onclick="toggleTodoGlobal('${ds}',${i})"></div>
        <div class="tli-body"><div class="tli-text ${t.done?'done':''}">${esc(t.text)}</div>
        <div class="tli-date">${dateStr}${timeStr?' · '+timeStr:''}</div></div>
        <button class="tli-del" onclick="delTodoGlobal('${ds}',${i})">×</button></div>`;
    });
    html+='</div>';
  });
  sv.innerHTML=html;
}
function toggleTodoGlobal(ds,i){const d=dayData(ds);if(!d.todos[i])return;d.todos[i].done=!d.todos[i].done;saveData();renderTodosView();refreshCell(ds);}
function delTodoGlobal(ds,i){const d=dayData(ds);d.todos.splice(i,1);saveData();renderTodosView();refreshCell(ds);}

function setSView(m){svm=m;document.getElementById('tgl-list').className='btn'+(m==='list'?' atgl':'');document.getElementById('tgl-cal').className='btn'+(m==='cal'?' atgl':'');runSearch();}
function runSearch(){
  const q=document.getElementById('search-input').value.trim().toLowerCase();
  if(!q){document.getElementById('search-results').innerHTML='';return;}
  const res=[];

  // カレンダーデータ（記録・予定・TODO・家計簿）
  Object.entries(DATA).forEach(([ds,d])=>{
    (d.entries||[]).forEach(e=>{if(e.text.toLowerCase().includes(q))res.push({ds,cat:e.cat,text:e.text,type:'cal'});});
    (d.finRows||[]).forEach(r=>{if((r.desc||'').toLowerCase().includes(q))res.push({ds,cat:'finance',text:`${r.subcat} ${r.desc} ${r.amount}円`,type:'cal'});});
    (d.events||[]).forEach(ev=>{if((ev.title||'').toLowerCase().includes(q)||(ev.note||'').toLowerCase().includes(q))res.push({ds,cat:'event',text:`${ev.start?ev.start+' ':''}${ev.title||''}`,type:'cal'});});
    (d.todos||[]).forEach(t=>{if((t.text||'').toLowerCase().includes(q))res.push({ds,cat:'todo',text:t.text,type:'cal'});});
  });
  res.sort((a,b)=>b.ds.localeCompare(a.ds));

  // 知識データ
  const knRes=[];
  (KN.recipes||[]).forEach((r,i)=>{
    if((r.name||'').toLowerCase().includes(q)||(r.note||'').toLowerCase().includes(q)||(r.url||'').toLowerCase().includes(q))
      knRes.push({type:'recipe',icon:'🍳',title:r.name,sub:r.note||'',url:r.url,idx:i});
  });
  (KN.quizzes||[]).forEach((q2,i)=>{
    if((q2.text||'').toLowerCase().includes(q))
      knRes.push({type:'quiz',icon:'💡',title:q2.text,sub:q2.date||'',url:'',idx:i});
  });
  (KN.ents||[]).forEach((e,i)=>{
    if((e.title||'').toLowerCase().includes(q)||(e.url||'').toLowerCase().includes(q))
      knRes.push({type:'ent',icon:'🎬',title:e.title,sub:e.cat||'',url:e.url,idx:i});
  });

  const el=document.getElementById('search-results');
  const total=res.length+knRes.length;
  if(!total){el.innerHTML='<div class="empty">見つかりませんでした</div>';return;}

  if(svm==='list'){
    let h=`<div style="font-size:10px;color:var(--text3);margin-bottom:8px">${total}件</div>`;
    // カレンダー結果
    res.forEach(r=>{
      const d=new Date(r.ds+'T00:00:00');
      const hl=r.text.replace(new RegExp(escReg(q),'gi'),m=>`<span class="hl">${m}</span>`);
      h+=`<div class="sr" onclick="openDay('${r.ds}');showView('calendar')"><div class="sr-date">${d.getFullYear()}年${d.getMonth()+1}月${d.getDate()}日</div><div class="sr-text">${hl}</div></div>`;
    });
    // 知識結果
    if(knRes.length){
      h+=`<div style="font-size:10px;color:var(--text3);margin:12px 0 6px;letter-spacing:.5px">📚 知識</div>`;
      knRes.forEach(r=>{
        const hlTitle=r.title.replace(new RegExp(escReg(q),'gi'),m=>`<span class="hl">${m}</span>`);
        const tabMap={recipe:'recipe',quiz:'quiz',ent:'ent'};
        h+=`<div class="sr" onclick="showView('knowledge');setKnTab('${tabMap[r.type]}')">
          <div class="sr-date">${r.icon} ${r.sub}</div>
          <div class="sr-text">${hlTitle}</div>
          ${r.url?`<div style="font-size:10px;color:#4a80c0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${esc(r.url)}</div>`:''}
        </div>`;
      });
    }
    el.innerHTML=h;
  }else{
    // カレンダービューは日付ベースのデータのみ
    const hits=new Set(res.map(r=>r.ds));const now=new Date();let h='';
    if(knRes.length)h+=`<div style="font-size:11px;color:var(--text2);margin-bottom:10px">📚 知識: ${knRes.length}件ヒット（一覧タブで確認）</div>`;
    for(let mi=-2;mi<=2;mi++){const base=new Date(now.getFullYear(),now.getMonth()+mi,1);const y=base.getFullYear(),m=base.getMonth();const first=new Date(y,m,1),last=new Date(y,m+1,0);h+=`<div style="margin-bottom:12px"><div style="font-size:13px;font-weight:700;color:var(--text3);opacity:.4;padding:8px 4px 4px">${y}/${String(m+1).padStart(2,'0')}</div><div class="cal-grid-single">`;for(let i=0;i<first.getDay();i++)h+='<div></div>';for(let dd=1;dd<=last.getDate();dd++){const ds=fmt(y,m+1,dd);const hit=hits.has(ds);const dow=new Date(y,m,dd).getDay();h+=`<div class="cal-day ${dow===0?'sun':dow===6?'sat':''} ${ds===today()?'today':''}" style="${hit?'background:#7b84b018;border-color:#7b84b0':''}" onclick="openDay('${ds}');showView('calendar')"><div class="day-num">${dd}</div>${hit?'<div class="dot" style="background:#7b84b0;margin-top:2px"></div>':''}</div>`;}h+='</div></div>';}
    el.innerHTML=h;
  }
}

function setCalView(m){

  if(m==='week'){

      const t=today();const d=new Date(t+'T00:00:00');
      weekStartDs=dateAddDays(t,-d.getDay());
    }
    renderWeekView();
  }
}

function getEventsForDay(ds){
  const d=DATA[ds]||{};
  const direct=(d.events||[]);
  // gather repeat events from past dates
  const repeats=[];
  Object.entries(DATA).forEach(([srcDs,sd])=>{
    (sd.events||[]).forEach(ev=>{
      if(!ev.repeat||ev.repeat==='none')return;
      if(srcDs>=ds)return; // only past source
      const src=new Date(srcDs+'T00:00:00');
      const tgt=new Date(ds+'T00:00:00');
      const diff=Math.round((tgt-src)/86400000);
      const match=(ev.repeat==='daily')||
        (ev.repeat==='weekly'&&diff%7===0)||
        (ev.repeat==='monthly'&&src.getDate()===tgt.getDate());
      if(match)repeats.push({...ev,_repeated:true,_srcDs:srcDs});
    });
  });
  return [...direct,...repeats].sort((a,b)=>(a.allday?'00:00':a.start||'99').localeCompare(b.allday?'00:00':b.start||'99'));
}

const WK_HOUR_H=42;

  const wv=document.getElementById('week-view');

  days.forEach((ds,ci)=>{

      g+=`</div>`;
    });
  }

  // ── TIME ROWS ──
  for(let h=0;h<24;h++){
    for(let half=0;half<2;half++){
      const row=timeRowStart+h*2+half;
      const isHour=half===0;
      g+=`<div class="wk-gutter-cell" style="grid-row:${row};grid-column:1;height:${rowH}px;box-sizing:border-box${isHour&&h>0?';border-top:1px solid rgba(200,80,80,.06)':''}">`;

      g+=`</div>`;
      days.forEach((_,ci)=>{
        const isT=days[ci]===td;
        const dow=new Date(days[ci]+'T00:00:00').getDay();
        const borderTop=isHour&&h>0?'border-top:1px solid rgba(200,80,80,.06);':'';

  // ── OVERLAY EVENTS ──
  const _timeRowStart=timeRowStart; // capture for rAF closure

  requestAnimationFrame(()=>{
    const master=document.getElementById('wk-master');

    const cw=master.getBoundingClientRect().width;

    const actualHeaderH=firstTimeCells.length?firstTimeCells[0].offsetTop:_headerH;

    const dayW=(cw-gutterW)/7;

      placed.forEach(({slot,startMin,endMin,totalSlots,ev})=>{
        const topPx=actualHeaderH+(startMin/60)*WK_HOUR_H;

      });
    });

  // ── SWIPE ──
  const sc=document.getElementById('wk-scroll');
  if(sc&&!sc._swipeBound){
    sc._swipeBound=true;
    let tx=0,ty=0,active=false;
    sc.addEventListener('touchstart',e=>{if(e.touches.length!==1)return;tx=e.touches[0].clientX;ty=e.touches[0].clientY;active=true;},{passive:true});
    sc.addEventListener('touchend',e=>{
      if(!active)return;active=false;
      const dx=e.changedTouches[0].clientX-tx;
      const dy=e.changedTouches[0].clientY-ty;
      if(Math.abs(dx)>60&&Math.abs(dx)>Math.abs(dy)*1.8)weekShift(dx<0?1:-1);
    },{passive:true});
  }

  // ── SCROLL TO 8AM then reveal ──
  setTimeout(()=>{
    const s=document.getElementById('wk-scroll');
    if(s)s.scrollTop=8*WK_HOUR_H;
    setTimeout(()=>{
      wv.style.opacity='';
      wv.classList.add('wk-ready');

  // ── HEADER LABEL ──
  const s0=new Date(weekStartDs+'T00:00:00'),e0=new Date(days[6]+'T00:00:00');

    `${s0.getFullYear()}/${s0.getMonth()+1}/${s0.getDate()} – ${e0.getMonth()+1}/${e0.getDate()}`;
}
  const wv=document.getElementById('week-view');
  const days=[];
  for(let i=0;i<7;i++)days.push(dateAddDays(weekStartDs,i));
  const td=today();

  // ── SINGLE GRID: header + allday + time rows all in one grid ──
  // Columns: 48px gutter + 7 equal day columns
  // Rows: 1=header, 2=allday(optional), then 48 time half-rows
  const hasAllDay=days.some(ds=>getEventsForDay(ds).some(e=>e.allday));
  const rowH=WK_HOUR_H/2; // 21px per half-hour
  const timeRowStart=hasAllDay?3:2;

  // Row 1: header
  // ── OVERLAY EVENTS ──
  requestAnimationFrame(()=>{
    const master=document.getElementById('wk-master');
    if(!master)return;
    const masterRect=master.getBoundingClientRect();
    const gutterW=48;
    const dayW=(masterRect.width-gutterW)/7;

    days.forEach((ds,ci)=>{
      const evs=getEventsForDay(ds).filter(e=>!e.allday&&e.start);

      });

        p.totalSlots=Math.max(...placed.filter(q=>q.endMin>p.startMin&&q.startMin<p.endMin).map(q=>q.slot+1));
      });
      placed.forEach(({slot,startMin,endMin,totalSlots,ev})=>{
        const topPx=masterHeaderH+(startMin/60)*WK_HOUR_H;

        evEl.onclick=(e)=>{e.stopPropagation();openDay(ds);setPanelTab('event');};
        master.appendChild(evEl);

function rolloverTodos(){
  const td=today();
  let count=0;
  Object.entries(DATA).forEach(([ds,d])=>{
    if(ds>=td)return;
    const undone=(d.todos||[]).filter(t=>!t.done);
    if(!undone.length)return;
    const tdData=dayData(td);
    undone.forEach(t=>{
      tdData.todos.push({...t,_rolledFrom:ds});
      count++;
    });
    d.todos=(d.todos||[]).filter(t=>t.done);
  });
  saveData();renderTodosView();
  alert(count>0?`${count}件のTODOを今日に繰り越しました`:'繰り越せるTODOはありません');
}

    const pts=days.map(ds=>({ds,mood:(DATA[ds]?.mood||0),cond:(DATA[ds]?.cond||0)}));
    const lineHtml=pts.map(p=>{
      const d=new Date(p.ds+'T00:00:00');
      const mh=p.mood?Math.round(((p.mood-1)/4)*50):0;
      const ch=p.cond?Math.round(((p.cond-1)/4)*50):0;
      return `<div class="mood-bar-wrap">
        <div style="height:50px;display:flex;align-items:flex-end;gap:2px">
          <div style="width:8px;height:${mh}px;background:var(--acc);border-radius:2px 2px 0 0;opacity:.8"></div>
          <div style="width:8px;height:${ch}px;background:#c058a0;border-radius:2px 2px 0 0;opacity:.8"></div>
        </div>
        <div class="mood-date">${d.getMonth()+1}/${d.getDate()}</div>
      </div>`;
    }).join('');
    html+=`<div class="sum-section"><div class="sum-section-title">気分(緑)・体調(紫)</div><div class="mood-line">${lineHtml}</div></div>`;
  }

  // 日記ハッシュタグ頻度グラフ
  const tagFreq={};
  diaryTexts.forEach(t=>{
    const m=t.match(/#[\w\u3040-\u9fff\u30a0-\u30ff]+/g)||[];
    m.forEach(tag=>{tagFreq[tag]=(tagFreq[tag]||0)+1;});
  });
  if(Object.keys(tagFreq).length){
    const max=Math.max(...Object.values(tagFreq));
    const bars=Object.entries(tagFreq).sort((a,b)=>b[1]-a[1]).slice(0,8).map(([tag,cnt])=>`
      <div style="margin-bottom:5px">
        <div style="display:flex;justify-content:space-between;font-size:10px;margin-bottom:2px">
          <span style="color:var(--acc)">${esc(tag)}</span><span style="color:var(--text3)">${cnt}</span>
        </div>
        <div style="height:4px;background:var(--bg3);border-radius:2px">
          <div style="height:100%;width:${Math.round(cnt/max*100)}%;background:var(--acc);opacity:.7;border-radius:2px"></div>
        </div>
      </div>`).join('');
    html+=`<div class="sum-section"><div class="sum-section-title">ハッシュタグ頻度</div>${bars}</div>`;
  }

  // ワードクラウド（日記テキストから）
  const allText=diaryTexts.join(' ');
  const words=allText.replace(/#\S+/g,'').split(/[\s、。！？!?.,\n]+/).filter(w=>w.length>1&&!/^[a-zA-Z0-9]$/.test(w));
  const wfreq={};words.forEach(w=>{wfreq[w]=(wfreq[w]||0)+1;});
  const topWords=Object.entries(wfreq).sort((a,b)=>b[1]-a[1]).slice(0,30);
  if(topWords.length){
    const maxW=topWords[0][1];
    const cloud=topWords.map(([w,n])=>{
      const sz=12+Math.round((n/maxW)*16);
      const op=0.5+((n/maxW)*0.5);
      return `<span class="wc-tag" style="font-size:${sz}px;opacity:${op};background:var(--bg3);color:var(--text2)">${esc(w)}</span>`;
    }).join('');
    html+=`<div class="sum-section"><div class="sum-section-title">日記ワードクラウド</div><div class="wcloud">${cloud}</div></div>`;
  }

  // 各日の予定リスト
  const evRows=days.flatMap(ds=>(DATA[ds]?.events||[]).map(ev=>{
    const d=new Date(ds+'T00:00:00');
    return `<div style="display:flex;gap:8px;padding:4px 0;border-bottom:1px solid var(--border);font-size:11px">
      <span style="color:var(--text3);flex-shrink:0">${d.getMonth()+1}/${d.getDate()}</span>
      <span style="color:#6090cc">${ev.allday?'終日':ev.start||''}</span>
      <span style="color:var(--text)">${esc(ev.title||'')}</span>
    </div>`;
  }));
  if(evRows.length)html+=`<div class="sum-section"><div class="sum-section-title">今週の予定</div>${evRows.join('')}</div>`;

  if(!html.includes('sum-section'))html='<div class="empty" style="padding:40px">この週の記録はありません</div>';
  sv.innerHTML=html;
}

// ===== HASHTAG FREQ GRAPH (standalone in stats) =====
function renderHashtagGraph(dates,sv){
  const freq={};
  dates.forEach(ds=>{
    const d=DATA[ds];if(!d)return;
    (d.entries||[]).filter(e=>e.cat==='diary').forEach(e=>{
      const m=(e.text||'').match(/#[\w\u3040-\u9fff\u30a0-\u30ff]+/g)||[];
      m.forEach(t=>{freq[t]=(freq[t]||0)+1;});
    });
  });
  const top=Object.entries(freq).sort((a,b)=>b[1]-a[1]).slice(0,15);
  if(!top.length)return '';
  const max=top[0][1];
  const bars=top.map(([tag,cnt])=>`
    <div style="margin-bottom:6px">
      <div style="display:flex;justify-content:space-between;font-size:11px;margin-bottom:2px">
        <span style="color:var(--acc)">${esc(tag)}</span><span style="color:var(--text3)">${cnt}回</span>
      </div>
      <div style="height:5px;background:var(--bg3);border-radius:2px">
        <div style="height:100%;width:${Math.round(cnt/max*100)}%;background:var(--acc);opacity:.7;border-radius:2px"></div>
      </div>
    </div>`).join('');
  return `<div class="cw"><div class="ctitle">ハッシュタグ頻度</div>${bars}</div>`;
}

  const catOpts=KN.entCats.map(c=>`<option value="${esc(c)}">${esc(c)}</option>`).join('');
  const filter=window._entFilter||'all';
  let h=`<div class="kn-add-form">
    <div class="frow"><label class="flabel">タイトル</label><input type="text" id="kn-e-title" placeholder="タイトルを入力"></div>
