function setSView(m){svm=m;document.getElementById('tgl-list').className='btn'+(m==='list'?' atgl':'');document.getElementById('tgl-cal').className='btn'+(m==='cal'?' atgl':'');runSearch();}
function runSearch(){
  const q=document.getElementById('search-input').value.trim().toLowerCase();
  if(!q){document.getElementById('search-results').innerHTML='';return;}
  const res=[];

  // カレンダーデータ（記録・予定・TODO・家計簿）
  Object.entries(DATA).forEach(([ds,d])=>{
    (d.entries||[]).forEach(e=>{if(e.text.toLowerCase().includes(q))res.push({ds,cat:e.cat,text:e.text,type:'cal'});});
    (d.finRows||[]).forEach(r=>{if((r.desc||'').toLowerCase().includes(q))res.push({ds,cat:'finance',text:`${r.subcat} ${r.desc} ${r.amount}円`,type:'cal'});});
    (d.events||[]).forEach(ev=>{if((ev.title||'').toLowerCase().includes(q)||(ev.note||'').toLowerCase().includes(q))res.push({ds,cat:'event',text:`${ev.start?ev.start+' ':''}${ev.title||''}`,type:'cal'});});
    (d.todos||[]).forEach(t=>{if((t.text||'').toLowerCase().includes(q))res.push({ds,cat:'todo',text:t.text,type:'cal'});});
  });
  res.sort((a,b)=>b.ds.localeCompare(a.ds));

  // 知識データ
  const knRes=[];
  (KN.recipes||[]).forEach((r,i)=>{
    if((r.name||'').toLowerCase().includes(q)||(r.note||'').toLowerCase().includes(q)||(r.url||'').toLowerCase().includes(q))
      knRes.push({type:'recipe',icon:'🍳',title:r.name,sub:r.note||'',url:r.url,idx:i});
  });
  (KN.quizzes||[]).forEach((q2,i)=>{
    if((q2.text||'').toLowerCase().includes(q))
      knRes.push({type:'quiz',icon:'💡',title:q2.text,sub:q2.date||'',url:'',idx:i});
  });
  (KN.ents||[]).forEach((e,i)=>{
    if((e.title||'').toLowerCase().includes(q)||(e.url||'').toLowerCase().includes(q))
      knRes.push({type:'ent',icon:'🎬',title:e.title,sub:e.cat||'',url:e.url,idx:i});
  });

  const el=document.getElementById('search-results');
  const total=res.length+knRes.length;
  if(!total){el.innerHTML='<div class="empty">見つかりませんでした</div>';return;}

  if(svm==='list'){
    let h=`<div style="font-size:10px;color:var(--text3);margin-bottom:8px">${total}件</div>`;
    // カレンダー結果
    res.forEach(r=>{
      const d=new Date(r.ds+'T00:00:00');
      const hl=r.text.replace(new RegExp(escReg(q),'gi'),m=>`<span class="hl">${m}</span>`);
      h+=`<div class="sr" onclick="openDay('${r.ds}');showView('calendar')"><div class="sr-date">${d.getFullYear()}年${d.getMonth()+1}月${d.getDate()}日</div><div class="sr-text">${hl}</div></div>`;
    });
    // 知識結果
    if(knRes.length){
      h+=`<div style="font-size:10px;color:var(--text3);margin:12px 0 6px;letter-spacing:.5px">📚 知識</div>`;
      knRes.forEach(r=>{
        const hlTitle=r.title.replace(new RegExp(escReg(q),'gi'),m=>`<span class="hl">${m}</span>`);
        const tabMap={recipe:'recipe',quiz:'quiz',ent:'ent'};
        h+=`<div class="sr" onclick="showView('knowledge');setKnTab('${tabMap[r.type]}')">
          <div class="sr-date">${r.icon} ${r.sub}</div>
          <div class="sr-text">${hlTitle}</div>
          ${r.url?`<div style="font-size:10px;color:#4a80c0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${esc(r.url)}</div>`:''}
        </div>`;
      });
    }
    el.innerHTML=h;
  }else{
    // カレンダービューは日付ベースのデータのみ
    const hits=new Set(res.map(r=>r.ds));const now=new Date();let h='';
    if(knRes.length)h+=`<div style="font-size:11px;color:var(--text2);margin-bottom:10px">📚 知識: ${knRes.length}件ヒット（一覧タブで確認）</div>`;
    for(let mi=-2;mi<=2;mi++){const base=new Date(now.getFullYear(),now.getMonth()+mi,1);const y=base.getFullYear(),m=base.getMonth();const first=new Date(y,m,1),last=new Date(y,m+1,0);h+=`<div style="margin-bottom:12px"><div style="font-size:13px;font-weight:700;color:var(--text3);opacity:.4;padding:8px 4px 4px">${y}/${String(m+1).padStart(2,'0')}</div><div class="cal-grid-single">`;for(let i=0;i<first.getDay();i++)h+='<div></div>';for(let dd=1;dd<=last.getDate();dd++){const ds=fmt(y,m+1,dd);const hit=hits.has(ds);const dow=new Date(y,m,dd).getDay();h+=`<div class="cal-day ${dow===0?'sun':dow===6?'sat':''} ${ds===today()?'today':''}" style="${hit?'background:#7b84b018;border-color:#7b84b0':''}" onclick="openDay('${ds}');showView('calendar')"><div class="day-num">${dd}</div>${hit?'<div class="dot" style="background:#7b84b0;margin-top:2px"></div>':''}</div>`;}h+='</div></div>';}
    el.innerHTML=h;
  }
}

let _catDragIdx=-1;
function catDragStart(e,i){
  _catDragIdx=i;
  e.dataTransfer.effectAllowed='move';
  e.currentTarget.style.opacity='.4';
}
function catDragOver(e){
  e.preventDefault();
  e.dataTransfer.dropEffect='move';
  e.currentTarget.style.background='var(--bg4)';
}
function catDrop(e,toIdx){
  e.preventDefault();
  if(_catDragIdx===toIdx)return;
  const cats=getCats();
  const moved=cats.splice(_catDragIdx,1)[0];
  cats.splice(toIdx,0,moved);
  SETTINGS.cats=cats;
  saveSets();renderSettings();
}
function catDragEnd(){
  _catDragIdx=-1;
  document.querySelectorAll('.sv-sortable').forEach(el=>{
    el.style.opacity='';el.style.background='';
  });
}

function importData(e){
  const file=e.target.files[0];if(!file)return;
  const r=new FileReader();
  r.onload=ev=>{try{const j=JSON.parse(ev.target.result);if(j.data)DATA=j.data;if(j.settings)SETTINGS=j.settings;saveData();saveSets();initUI();buildCal();alert('インポート完了');}catch(err){alert('読み込みに失敗しました');}};
  r.readAsText(file);
}

// ===== WEEK VIEW =====
let calViewMode='month'; // 'month' | 'week'
let weekStartDs='';

function setCalView(m){
  calViewMode=m;
  document.getElementById('pill-month').classList.toggle('on',m==='month');
  document.getElementById('pill-week').classList.toggle('on',m==='week');
  document.getElementById('cal-scroll').style.display=m==='month'?'block':'none';
  document.getElementById('week-view').style.display=m==='week'?'flex':'none';
  if(m==='week'){
    if(!weekStartDs){
      const t=today();const d=new Date(t+'T00:00:00');
      weekStartDs=dateAddDays(t,-d.getDay());
    }
    renderWeekView();
  }
}

function getEventsForDay(ds){
  const d=DATA[ds]||{};
  const direct=(d.events||[]);
  // gather repeat events from past dates
  const repeats=[];
  Object.entries(DATA).forEach(([srcDs,sd])=>{
    (sd.events||[]).forEach(ev=>{
      if(!ev.repeat||ev.repeat==='none')return;
      if(srcDs>=ds)return; // only past source
      const src=new Date(srcDs+'T00:00:00');
      const tgt=new Date(ds+'T00:00:00');
      const diff=Math.round((tgt-src)/86400000);
      const match=(ev.repeat==='daily')||
        (ev.repeat==='weekly'&&diff%7===0)||
        (ev.repeat==='monthly'&&src.getDate()===tgt.getDate());
      if(match)repeats.push({...ev,_repeated:true,_srcDs:srcDs});
    });
  });
  return [...direct,...repeats].sort((a,b)=>(a.allday?'00:00':a.start||'99').localeCompare(b.allday?'00:00':b.start||'99'));
}

const WK_HOUR_H=42;
function renderWeekView(){
  const wv=document.getElementById('week-view');
  const days=[];
  for(let i=0;i<7;i++)days.push(dateAddDays(weekStartDs,i));
  const td=today();
  const hasAllDay=days.some(ds=>getEventsForDay(ds).some(e=>e.allday));
  const rowH=WK_HOUR_H/2; // 21px per half-hour row
  const timeRowStart=hasAllDay?3:2;
  const rowDefs=`auto${hasAllDay?' auto':''} repeat(48,${rowH}px)`;

  // ONE grid container for everything — header, allday, time cells all share same columns
  let g=`<div id="wk-master" style="display:grid;grid-template-columns:48px repeat(7,1fr);grid-template-rows:${rowDefs};position:relative;width:100%">`;

  // ── ROW 1: header ──
  g+=`<div style="grid-row:1;grid-column:1;background:rgba(10,16,28,.6);border-right:1px solid rgba(255,255,255,.04);border-bottom:1px solid rgba(255,255,255,.04);position:sticky;top:0;z-index:20"></div>`;
  days.forEach((ds,ci)=>{
    const d=new Date(ds+'T00:00:00');
    const dow=d.getDay();const isT=ds===td;
    const sun=dow===0,sat=dow===6;
    const colCls=`wk-head-col${isT?' wk-today':''}${sun?' wk-sun':''}${sat?' wk-sat':''}`;
    g+=`<div class="${colCls}" style="grid-row:1;grid-column:${ci+2};border-bottom:1px solid rgba(255,255,255,.04);position:sticky;top:0;z-index:20;background:rgba(13,19,30,.95)" onclick="openDay('${ds}')">
      <div class="wk-dow">${DAYS[dow]}</div>
      <div class="wk-num">${d.getDate()}</div>
    </div>`;
  });

  // ── ROW 2: all-day ──
  if(hasAllDay){
    g+=`<div class="wk-allday-gutter" style="grid-row:2;grid-column:1;position:sticky;top:56px;z-index:19">終日</div>`;
    days.forEach((ds,ci)=>{
      const evs=getEventsForDay(ds).filter(e=>e.allday);
      const isT=ds===td;
      g+=`<div class="wk-allday-col" style="grid-row:2;grid-column:${ci+2};position:sticky;top:56px;z-index:19;background:${isT?'rgba(78,200,122,.03)':'rgba(12,18,32,.7)'}">`;
      evs.forEach(ev=>{g+=`<div class="wk-allday-ev" onclick="openDay('${ds}')">${esc(ev.title||'')}</div>`;});
      g+=`</div>`;
    });
  }

  // ── TIME ROWS ──
  for(let h=0;h<24;h++){
    for(let half=0;half<2;half++){
      const row=timeRowStart+h*2+half;
      const isHour=half===0;
      g+=`<div class="wk-gutter-cell" style="grid-row:${row};grid-column:1;height:${rowH}px;box-sizing:border-box${isHour&&h>0?';border-top:1px solid rgba(255,255,255,.04)':''}">`;
      if(isHour&&h>0)g+=`<span class="wk-tlbl">${String(h).padStart(2,'0')}:00</span>`;
      g+=`</div>`;
      days.forEach((_,ci)=>{
        const isT=days[ci]===td;
        const dow=new Date(days[ci]+'T00:00:00').getDay();
        const borderTop=isHour&&h>0?'border-top:1px solid rgba(255,255,255,.04);':'';
        const halfBorder=!isHour?'border-top:1px dashed rgba(255,255,255,.015);':'';
        const leftBorder=ci>0?'border-left:1px solid rgba(255,255,255,.025);':'';
        let bg='';
        if(isT)bg='background:linear-gradient(180deg,rgba(78,200,122,.025) 0%,rgba(78,200,122,.018) 100%)';
        g+=`<div style="grid-row:${row};grid-column:${ci+2};height:${rowH}px;box-sizing:border-box;${borderTop}${halfBorder}${leftBorder}${bg?';'+bg:''};cursor:pointer" onclick="openDayAtTime('${days[ci]}',${h},${half})">`;
        if(isT&&h===0&&half===0)g+=`<div class="wk-today-top-bar"></div>`;
        g+=`</div>`;
      });
    }
  }

  // ── NOW LINE ──
  const nowMs=new Date();
  const headerH=hasAllDay?56+22:56;
  const nowTopPx=headerH+(nowMs.getHours()*60+nowMs.getMinutes())/60*WK_HOUR_H;
  const todayCol=days.findIndex(ds=>ds===td);
  if(todayCol>=0){
    const leftCalc=`calc(48px + ${todayCol}/7*(100% - 48px))`;
    g+=`<div style="position:absolute;top:${nowTopPx}px;left:0;right:0;pointer-events:none;z-index:10">
      <div class="wk-now-dot" style="left:calc(${leftCalc} - 3.5px)"></div>
      <div class="wk-now-line-el" style="left:${leftCalc};right:calc((6-${todayCol})/7*(100% - 48px))"></div>
    </div>`;
  }

  g+=`</div>`; // close wk-master

  wv.innerHTML=`<div class="wk-outer"><div id="wk-scroll" class="wk-scroll">${g}</div></div>`;
  wv.style.opacity='0';

  // ── OVERLAY EVENTS ──
  const _timeRowStart=timeRowStart; // capture for rAF closure
  const _headerH=headerH;
  requestAnimationFrame(()=>{
    const master=document.getElementById('wk-master');
    if(!master)return;
    const cw=master.getBoundingClientRect().width;
    const gutterW=48;
    // measure actual header height from first time-row cell
    const firstTimeCells=master.querySelectorAll(`[style*="grid-row:${_timeRowStart}"]`);
    const actualHeaderH=firstTimeCells.length?firstTimeCells[0].offsetTop:_headerH;

    const dayW=(cw-gutterW)/7;
    days.forEach((ds,ci)=>{
      const evs=getEventsForDay(ds).filter(e=>!e.allday&&e.start);
      const placed=[];
      evs.forEach(ev=>{
        const [sh,sm]=ev.start.split(':').map(Number);
        const [eh,em]=(ev.end||ev.start).split(':').map(Number);
        const startMin=sh*60+sm;
        const endMin=Math.max(eh*60+em,startMin+30);
        let slot=0;
        while(placed.some(p=>p.slot===slot&&p.endMin>startMin&&p.startMin<endMin))slot++;
        placed.push({slot,startMin,endMin,ev});
      });
      placed.forEach(p=>{p.totalSlots=Math.max(...placed.filter(q=>q.endMin>p.startMin&&q.startMin<p.endMin).map(q=>q.slot+1));});
      placed.forEach(({slot,startMin,endMin,totalSlots,ev})=>{
        const topPx=actualHeaderH+(startMin/60)*WK_HOUR_H;
        const heightPx=Math.max(((endMin-startMin)/60)*WK_HOUR_H,18);
        const colW=dayW/totalSlots;
        const el=document.createElement('div');
        el.style.cssText=`position:absolute;top:${topPx}px;height:${heightPx}px;left:${gutterW+ci*dayW+slot*colW+2}px;width:${colW-4}px;background:${ev._repeated?'#2a4878':'#3060a8'};border-radius:4px;padding:3px 5px;font-size:10px;font-weight:500;color:#fff;overflow:hidden;cursor:pointer;border:1px solid rgba(255,255,255,.12);z-index:5`;
        el.innerHTML=`<div style="font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis">${esc(ev.title||'')}</div><div style="font-size:9px;opacity:.8">${ev.start}${ev.end?'–'+ev.end:''}</div>`;
        el.onclick=(e)=>{
          e.stopPropagation();
          openDay(ds);
          setPanelTab('event');
          // find index of this event and open edit
          const evIdx=dayData(ds).events?.findIndex(ev2=>ev2.title===ev.title&&ev2.start===ev.start);
          if(evIdx>=0)setTimeout(()=>startEditEvent(evIdx),100);
        };
        master.appendChild(el);
      });
    });
  });

  // ── SWIPE ──
  const sc=document.getElementById('wk-scroll');
  if(sc&&!sc._swipeBound){
    sc._swipeBound=true;
    let tx=0,ty=0,active=false;
    sc.addEventListener('touchstart',e=>{if(e.touches.length!==1)return;tx=e.touches[0].clientX;ty=e.touches[0].clientY;active=true;},{passive:true});
    sc.addEventListener('touchend',e=>{
      if(!active)return;active=false;
      const dx=e.changedTouches[0].clientX-tx;
      const dy=e.changedTouches[0].clientY-ty;
      if(Math.abs(dx)>60&&Math.abs(dx)>Math.abs(dy)*1.8)weekShift(dx<0?1:-1);
    },{passive:true});
  }

  // ── SCROLL TO 8AM then reveal ──
  setTimeout(()=>{
    const s=document.getElementById('wk-scroll');
    if(s)s.scrollTop=8*WK_HOUR_H;
    setTimeout(()=>{
      wv.style.opacity='';
      wv.classList.add('wk-ready');
    },40);
  },60);

  // ── HEADER LABEL ──
  const s0=new Date(weekStartDs+'T00:00:00'),e0=new Date(days[6]+'T00:00:00');
  document.getElementById('cal-year-month').textContent=
    `${s0.getFullYear()}/${s0.getMonth()+1}/${s0.getDate()} – ${e0.getMonth()+1}/${e0.getDate()}`;
}
  const wv=document.getElementById('week-view');
  const days=[];
  for(let i=0;i<7;i++)days.push(dateAddDays(weekStartDs,i));
  const td=today();

  // ── SINGLE GRID: header + allday + time rows all in one grid ──
  // Columns: 48px gutter + 7 equal day columns
  // Rows: 1=header, 2=allday(optional), then 48 time half-rows
  const hasAllDay=days.some(ds=>getEventsForDay(ds).some(e=>e.allday));
  const rowH=WK_HOUR_H/2; // 21px per half-hour
  const timeRowStart=hasAllDay?3:2;
  const totalRows=timeRowStart+47; // 48 half-rows (0:00–23:30)

  let rowDefs=`auto${hasAllDay?' auto':''} repeat(48,${rowH}px)`;

  let html=`<div class="wk-outer"><div id="wk-master" style="display:grid;grid-template-columns:48px repeat(7,1fr);grid-template-rows:${rowDefs};width:100%;min-width:0">`;

  // Row 1: header
  // ── OVERLAY EVENTS ──
  requestAnimationFrame(()=>{
    const master=document.getElementById('wk-master');
    if(!master)return;
    const masterRect=master.getBoundingClientRect();
    const gutterW=48;
    const dayW=(masterRect.width-gutterW)/7;
    const masterHeaderH=hasAllDay?56+22:56;

    days.forEach((ds,ci)=>{
      const evs=getEventsForDay(ds).filter(e=>!e.allday&&e.start);
      const placed=[];
      evs.forEach(ev=>{
        const [sh,sm]=ev.start.split(':').map(Number);
        const endStr=ev.end||ev.start;
        const [eh,em]=endStr.split(':').map(Number);
        const startMin=sh*60+sm;
        const endMin=Math.max(eh*60+em,startMin+30);
        let slot=0;
        while(placed.some(p=>p.slot===slot&&p.endMin>startMin&&p.startMin<endMin))slot++;
        placed.push({slot,startMin,endMin,ev});
      });
      placed.forEach(p=>{
        p.totalSlots=Math.max(...placed.filter(q=>q.endMin>p.startMin&&q.startMin<p.endMin).map(q=>q.slot+1));
      });
      placed.forEach(({slot,startMin,endMin,totalSlots,ev})=>{
        const topPx=masterHeaderH+(startMin/60)*WK_HOUR_H;
        const heightPx=Math.max(((endMin-startMin)/60)*WK_HOUR_H,18);
        const colW=dayW/totalSlots;
        const leftPx=gutterW+ci*dayW+slot*colW+2;
        const widthPx=colW-4;
        const color=ev.color||(ev._repeated?'#2a4878':'#3060a8');
        const evEl=document.createElement('div');
        evEl.style.cssText=`position:absolute;top:${topPx}px;height:${heightPx}px;left:${leftPx}px;width:${widthPx}px;background:${color};border-radius:4px;padding:3px 5px;font-size:10px;font-weight:500;color:#fff;overflow:hidden;cursor:pointer;border:1px solid rgba(255,255,255,.12);z-index:5`;
        evEl.innerHTML=`<div style="font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis">${esc(ev.title||'')}</div><div style="font-size:9px;opacity:.8">${ev.start}${ev.end?'–'+ev.end:''}</div>`;
        evEl.onclick=(e)=>{e.stopPropagation();openDay(ds);setPanelTab('event');};
        master.appendChild(evEl);
      });
    });
  });

// ===== TODO ROLLOVER =====
function rolloverTodos(){
  const td=today();
  let count=0;
  Object.entries(DATA).forEach(([ds,d])=>{
    if(ds>=td)return;
    const undone=(d.todos||[]).filter(t=>!t.done);
    if(!undone.length)return;
    const tdData=dayData(td);
    undone.forEach(t=>{
      tdData.todos.push({...t,_rolledFrom:ds});
      count++;
    });
    d.todos=(d.todos||[]).filter(t=>t.done);
  });
  saveData();renderTodosView();
  alert(count>0?`${count}件のTODOを今日に繰り越しました`:'繰り越せるTODOはありません');
}

let summaryWeekStart='';
function initSummaryWeek(){
  const t=today();const d=new Date(t+'T00:00:00');
  summaryWeekStart=dateAddDays(t,-d.getDay());
}
function summaryShift(d){
  summaryWeekStart=dateAddDays(summaryWeekStart,d*7);
  renderSummaryView();
}
function renderSummaryView(){
  if(!summaryWeekStart)initSummaryWeek();
  const sv=document.getElementById('summary-view');
  const days=[];
  for(let i=0;i<7;i++)days.push(dateAddDays(summaryWeekStart,i));
  const end=days[6];
  const s=new Date(summaryWeekStart+'T00:00:00'),e=new Date(end+'T00:00:00');
  document.getElementById('summary-week-lbl').textContent=`${s.getMonth()+1}/${s.getDate()}〜${e.getMonth()+1}/${e.getDate()}`;

  // stats
  let totalMins=0,entryCount=0,todoCount=0,todoDone=0,evCount=0;
  const catMins={};const diaryTexts=[];const moodData=[];const condData=[];
  days.forEach(ds=>{
    const d=DATA[ds];if(!d)return;
    (d.entries||[]).forEach(e=>{
      entryCount++;
      if(e.num)totalMins+=e.num;
      if(e.num)catMins[e.cat]=(catMins[e.cat]||0)+e.num;
      if(e.cat==='diary')diaryTexts.push(e.text||'');
    });
    (d.todos||[]).forEach(t=>{todoCount++;if(t.done)todoDone++;});
    evCount+=(d.events||[]).length;
    if(d.mood)moodData.push({ds,v:d.mood});
    if(d.cond)condData.push({ds,v:d.cond});
  });

  let html=`<div class="sum-section"><div class="sum-section-title">週の概要</div>
    <div class="sum-row">
      <div class="sum-card"><div class="sv">${Math.floor(totalMins/60)}h${totalMins%60}m</div><div class="sl">記録時間</div></div>
      <div class="sum-card"><div class="sv">${entryCount}</div><div class="sl">記録件数</div></div>
      <div class="sum-card"><div class="sv">${todoDone}/${todoCount}</div><div class="sl">TODO完了</div></div>
      <div class="sum-card"><div class="sv">${evCount}</div><div class="sl">予定</div></div>
    </div>
  </div>`;

  // カテゴリ別時間
  if(Object.keys(catMins).length){
    const rows=Object.entries(catMins).sort((a,b)=>b[1]-a[1]).map(([c,m])=>`
      <div style="margin-bottom:6px">
        <div style="display:flex;justify-content:space-between;font-size:11px;margin-bottom:2px">
          <span style="color:${catColor(c)}">${catLabel(c)}</span>
          <span style="color:var(--text2)">${Math.floor(m/60)}h${m%60}m</span>
        </div>
        <div style="height:4px;background:var(--bg3);border-radius:2px">
          <div style="height:100%;width:${Math.min(100,Math.round(m/totalMins*100))}%;background:${catColor(c)};border-radius:2px"></div>
        </div>
      </div>`).join('');
    html+=`<div class="sum-section"><div class="sum-section-title">カテゴリ別時間</div>${rows}</div>`;
  }

  // 気分・体調グラフ
  if(moodData.length||condData.length){
    const pts=days.map(ds=>({ds,mood:(DATA[ds]?.mood||0),cond:(DATA[ds]?.cond||0)}));
    const lineHtml=pts.map(p=>{
      const d=new Date(p.ds+'T00:00:00');
      const mh=p.mood?Math.round(((p.mood-1)/4)*50):0;
      const ch=p.cond?Math.round(((p.cond-1)/4)*50):0;
      return `<div class="mood-bar-wrap">
        <div style="height:50px;display:flex;align-items:flex-end;gap:2px">
          <div style="width:8px;height:${mh}px;background:var(--acc);border-radius:2px 2px 0 0;opacity:.8"></div>
          <div style="width:8px;height:${ch}px;background:#c058a0;border-radius:2px 2px 0 0;opacity:.8"></div>
        </div>
        <div class="mood-date">${d.getMonth()+1}/${d.getDate()}</div>
      </div>`;
    }).join('');
    html+=`<div class="sum-section"><div class="sum-section-title">気分(緑)・体調(紫)</div><div class="mood-line">${lineHtml}</div></div>`;
  }

  // 日記ハッシュタグ頻度グラフ
  const tagFreq={};
  diaryTexts.forEach(t=>{
    const m=t.match(/#[\w\u3040-\u9fff\u30a0-\u30ff]+/g)||[];
    m.forEach(tag=>{tagFreq[tag]=(tagFreq[tag]||0)+1;});
  });
  if(Object.keys(tagFreq).length){
    const max=Math.max(...Object.values(tagFreq));
    const bars=Object.entries(tagFreq).sort((a,b)=>b[1]-a[1]).slice(0,8).map(([tag,cnt])=>`
      <div style="margin-bottom:5px">
        <div style="display:flex;justify-content:space-between;font-size:10px;margin-bottom:2px">
          <span style="color:var(--acc)">${esc(tag)}</span><span style="color:var(--text3)">${cnt}</span>
        </div>
        <div style="height:4px;background:var(--bg3);border-radius:2px">
          <div style="height:100%;width:${Math.round(cnt/max*100)}%;background:var(--acc);opacity:.7;border-radius:2px"></div>
        </div>
      </div>`).join('');
    html+=`<div class="sum-section"><div class="sum-section-title">ハッシュタグ頻度</div>${bars}</div>`;
  }

  // ワードクラウド（日記テキストから）
  const allText=diaryTexts.join(' ');
  const words=allText.replace(/#\S+/g,'').split(/[\s、。！？!?.,\n]+/).filter(w=>w.length>1&&!/^[a-zA-Z0-9]$/.test(w));
  const wfreq={};words.forEach(w=>{wfreq[w]=(wfreq[w]||0)+1;});
  const topWords=Object.entries(wfreq).sort((a,b)=>b[1]-a[1]).slice(0,30);
  if(topWords.length){
    const maxW=topWords[0][1];
    const cloud=topWords.map(([w,n])=>{
      const sz=12+Math.round((n/maxW)*16);
      const op=0.5+((n/maxW)*0.5);
      return `<span class="wc-tag" style="font-size:${sz}px;opacity:${op};background:var(--bg3);color:var(--text2)">${esc(w)}</span>`;
    }).join('');
    html+=`<div class="sum-section"><div class="sum-section-title">日記ワードクラウド</div><div class="wcloud">${cloud}</div></div>`;
  }

  // 各日の予定リスト
  const evRows=days.flatMap(ds=>(DATA[ds]?.events||[]).map(ev=>{
    const d=new Date(ds+'T00:00:00');
    return `<div style="display:flex;gap:8px;padding:4px 0;border-bottom:1px solid var(--border);font-size:11px">
      <span style="color:var(--text3);flex-shrink:0">${d.getMonth()+1}/${d.getDate()}</span>
      <span style="color:#6090cc">${ev.allday?'終日':ev.start||''}</span>
      <span style="color:var(--text)">${esc(ev.title||'')}</span>
    </div>`;
  }));
  if(evRows.length)html+=`<div class="sum-section"><div class="sum-section-title">今週の予定</div>${evRows.join('')}</div>`;

  if(!html.includes('sum-section'))html='<div class="empty" style="padding:40px">この週の記録はありません</div>';
  sv.innerHTML=html;
}

// ===== HASHTAG FREQ GRAPH (standalone in stats) =====
function renderHashtagGraph(dates,sv){
  const freq={};
  dates.forEach(ds=>{
    const d=DATA[ds];if(!d)return;
    (d.entries||[]).filter(e=>e.cat==='diary').forEach(e=>{
      const m=(e.text||'').match(/#[\w\u3040-\u9fff\u30a0-\u30ff]+/g)||[];
      m.forEach(t=>{freq[t]=(freq[t]||0)+1;});
    });
  });
  const top=Object.entries(freq).sort((a,b)=>b[1]-a[1]).slice(0,15);
  if(!top.length)return '';
  const max=top[0][1];
  const bars=top.map(([tag,cnt])=>`
    <div style="margin-bottom:6px">
      <div style="display:flex;justify-content:space-between;font-size:11px;margin-bottom:2px">
        <span style="color:var(--acc)">${esc(tag)}</span><span style="color:var(--text3)">${cnt}回</span>

        <div style="height:100%;width:${Math.round(cnt/max*100)}%;background:var(--acc);opacity:.7;border-radius:2px"></div>
      </div>

  return `<div class="cw"><div class="ctitle">ハッシュタグ頻度</div>${bars}</div>`;

function handleKnTap(type,i){
  const now=Date.now();
  if(_knTap.type===type&&_knTap.idx===i&&now-_knTap.time<400){
    if(type==='recipe')editRecipe(i);
    else if(type==='quiz')editQuiz(i);
    else editEnt(i);
    _knTap.idx=-1;
  } else {_knTap.type=type;_knTap.idx=i;_knTap.time=now;}
}

function renderMoodView(){
  const sv=document.getElementById('mood-view');
  const days=parseInt(document.getElementById('mood-period').value);
  const end=new Date(),start=new Date();
  start.setDate(end.getDate()-days+1);
  const dates=[];
  for(let d=new Date(start);d<=end;d.setDate(d.getDate()+1))
    dates.push(fmt(d.getFullYear(),d.getMonth()+1,d.getDate()));
  const pts=dates.map(ds=>({ds,mood:DATA[ds]?.mood||0,cond:DATA[ds]?.cond||0})).filter(p=>p.mood||p.cond);
  if(!pts.length){sv.innerHTML='<div class="empty" style="padding:40px">気分・体調の記録がありません<br><small style="color:var(--text3)">記録タブのスライダーから入力できます</small></div>';return;}
  const chartH=100;
  const recent=pts.slice(-60);
  const moodVals=pts.filter(p=>p.mood).map(p=>p.mood);
  const condVals=pts.filter(p=>p.cond).map(p=>p.cond);
  const avg=arr=>arr.length?(arr.reduce((s,v)=>s+v,0)/arr.length).toFixed(1):'-';
  const MOOD_EMOJI={1:'😞',2:'😕',3:'😐',4:'😊',5:'😄'};
  const COND_EMOJI={1:'🤒',2:'😓',3:'😐',4:'💪',5:'✨'};
  let moodBars='',condBars='';
  recent.forEach((p,i)=>{
    const mh=p.mood?Math.round(((p.mood-1)/4)*chartH):0;
    const ch=p.cond?Math.round(((p.cond-1)/4)*chartH):0;
    const d=new Date(p.ds+'T00:00:00');
    const showLbl=i%Math.max(1,Math.floor(recent.length/8))===0;
    const lbl=`${d.getMonth()+1}/${d.getDate()}`;
    moodBars+=`<div style="flex:1;display:flex;flex-direction:column;align-items:center;gap:2px;min-width:0"><div style="flex:1;display:flex;align-items:flex-end"><div style="width:100%;max-width:14px;height:${mh}px;background:var(--acc);border-radius:2px 2px 0 0;opacity:.8"></div></div><div style="font-size:7px;color:var(--text3);white-space:nowrap">${showLbl?lbl:''}</div></div>`;
    condBars+=`<div style="flex:1;display:flex;flex-direction:column;align-items:center;gap:2px;min-width:0"><div style="flex:1;display:flex;align-items:flex-end"><div style="width:100%;max-width:14px;height:${ch}px;background:#c058a0;border-radius:2px 2px 0 0;opacity:.8"></div></div><div style="font-size:7px;color:var(--text3);white-space:nowrap">${showLbl?lbl:''}</div></div>`;
  });
  const recentList=pts.slice().reverse().slice(0,30).map(p=>{
    const d=new Date(p.ds+'T00:00:00');
    return `<div style="display:flex;align-items:center;gap:10px;padding:8px 0;border-bottom:1px solid var(--border)">
      <span style="font-size:11px;color:var(--text3);min-width:64px">${d.getMonth()+1}/${d.getDate()}（${DAYS[d.getDay()]}）</span>
      ${p.mood?`<span style="font-size:16px">${MOOD_EMOJI[p.mood]}</span><span style="font-size:11px;color:var(--acc)">${p.mood}/5</span>`:'<span style="opacity:.3">—</span><span></span>'}
      <span style="color:var(--border2);margin:0 2px">|</span>
      ${p.cond?`<span style="font-size:16px">${COND_EMOJI[p.cond]}</span><span style="font-size:11px;color:#c058a0">${p.cond}/5</span>`:'<span style="opacity:.3">—</span>'}
    </div>`;
  }).join('');
  sv.innerHTML=`
    <div class="cw"><div class="ctitle" style="display:flex;justify-content:space-between"><span>サマリー</span><span style="font-size:11px;color:var(--text3)">${pts.length}日分</span></div>
      <div class="sum-row">
        <div class="sum-card"><div class="sv" style="color:var(--acc)">${avg(moodVals)}</div><div class="sl">平均気分</div></div>
        <div class="sum-card"><div class="sv" style="color:#c058a0">${avg(condVals)}</div><div class="sl">平均体調</div></div>
        <div class="sum-card"><div class="sv">${pts.length}</div><div class="sl">記録日数</div></div>
      </div>
    </div>
    <div class="cw"><div class="ctitle">気分（緑）</div><div style="display:flex;align-items:flex-end;height:${chartH}px;gap:1px">${moodBars}</div></div>
    <div class="cw"><div class="ctitle">体調（紫）</div><div style="display:flex;align-items:flex-end;height:${chartH}px;gap:1px">${condBars}</div></div>
    <div class="cw"><div class="ctitle">記録一覧</div>${recentList}</div>`;
}

// ===== INDEXEDDB STORAGE =====
// localStorage の代わりに IndexedDB を使う
// キャッシュクリアでは消えない、より安全な保存先
const DB_NAME='lifelog_db', DB_VER=1;
let _db=null;

function openDB(){
  return new Promise((resolve,reject)=>{
    if(_db){resolve(_db);return;}
    const req=indexedDB.open(DB_NAME,DB_VER);
    req.onupgradeneeded=e=>{
      const db=e.target.result;
      if(!db.objectStoreNames.contains('store'))
        db.createObjectStore('store');
    };
    req.onsuccess=e=>{_db=e.target.result;resolve(_db);};
    req.onerror=()=>reject(req.error);
  });
}

async function dbGet(key){
  const db=await openDB();
  return new Promise((resolve,reject)=>{
    const tx=db.transaction('store','readonly');
    const req=tx.objectStore('store').get(key);
    req.onsuccess=()=>resolve(req.result??null);
    req.onerror=()=>reject(req.error);
  });
}

async function dbSet(key,val){
  const db=await openDB();
  return new Promise((resolve,reject)=>{
    const tx=db.transaction('store','readwrite');
    const req=tx.objectStore('store').put(val,key);
    req.onsuccess=()=>resolve();
    req.onerror=()=>reject(req.error);
  });
}

// localStorageからIndexedDBへの1回限りの移行
async function migrateFromLocalStorage(){
  const keys=[SK,SS,KN_KEY];
  for(const k of keys){
    try{
      const existing=await dbGet(k);
      if(existing!==null)continue; // already in IDB
      const old=localStorage.getItem(k);
      if(old){
        await dbSet(k,old);
        console.log(`Migrated ${k} from localStorage to IndexedDB`);
        // keep localStorage as backup for now
      }
    }catch(e){console.warn('Migration error',k,e);}
  }
}

function loadData(){
  // sync fallback — actual data loaded async in initAsync
  if(!SETTINGS.cats)SETTINGS.cats=[...DEFAULT_CATS];
  if(!SETTINGS.units)SETTINGS.units=[...DEFAULT_UNITS];
  if(!SETTINGS.studySubs)SETTINGS.studySubs=[...DEFAULT_STUDY_SUBS];
  ['game','book'].forEach(id=>{
    if(!SETTINGS.cats.find(c=>c.id===id)){
      const def=DEFAULT_CATS.find(c=>c.id===id);
      if(def)SETTINGS.cats.push({...def});
    }
  });
}

async function loadDataAsync(){
  try{
    const r=await dbGet(SK);
    if(r)DATA=JSON.parse(r);
  }catch(e){
    // fallback to localStorage
    try{const r=localStorage.getItem(SK);if(r)DATA=JSON.parse(r);}catch(e2){}
  }
  try{
    const r=await dbGet(SS);
    if(r)SETTINGS=JSON.parse(r);
  }catch(e){
    try{const r=localStorage.getItem(SS);if(r)SETTINGS=JSON.parse(r);}catch(e2){}
  }
  if(!SETTINGS.cats)SETTINGS.cats=[...DEFAULT_CATS];
  if(!SETTINGS.units)SETTINGS.units=[...DEFAULT_UNITS];
  if(!SETTINGS.studySubs)SETTINGS.studySubs=[...DEFAULT_STUDY_SUBS];
  ['game','book'].forEach(id=>{
    if(!SETTINGS.cats.find(c=>c.id===id)){
      const def=DEFAULT_CATS.find(c=>c.id===id);
      if(def)SETTINGS.cats.push({...def});
    }
  });
}

async function saveData(){
  const json=JSON.stringify(DATA);
  try{await dbSet(SK,json);}catch(e){
    try{localStorage.setItem(SK,json);}catch(e2){}
  }
}

async function saveSets(){
  const json=JSON.stringify(SETTINGS);
  try{await dbSet(SS,json);}catch(e){
    try{localStorage.setItem(SS,json);}catch(e2){}
  }
}

async function loadKN(){
  try{
    const r=await dbGet(KN_KEY);
    if(r)KN=JSON.parse(r);
  }catch(e){
    try{const r=localStorage.getItem(KN_KEY);if(r)KN=JSON.parse(r);}catch(e2){}
  }
  if(!KN.recipes)KN.recipes=[];
  if(!KN.quizzes)KN.quizzes=[];
  if(!KN.ents)KN.ents=[];
  if(!KN.entCats)KN.entCats=['映画','アニメ','ドラマ','本','音楽','ゲーム','その他'];
}

async function saveKN(){
  const json=JSON.stringify(KN);
  try{await dbSet(KN_KEY,json);}catch(e){
    try{localStorage.setItem(KN_KEY,json);}catch(e2){}
  }
}

// exportData も IndexedDB から取得
function exportData(){
  const blob=new Blob([JSON.stringify({data:DATA,settings:SETTINGS},null,2)],{type:'application/json'});
  const a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download='lifelog-export.json';a.click();
}

async function initAsync(){
  await migrateFromLocalStorage();

}
